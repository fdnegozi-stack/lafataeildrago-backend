<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; min-height: 100vh; font-family: 'Georgia', serif; color: #d4af37; overflow: hidden; }
  #avatarFrame { position: fixed; inset: 0; z-index: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
  .vid-layer { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.4s linear; }
  .vid-layer.hidden  { opacity: 0; pointer-events: none; }
  .vid-layer.visible { opacity: 1; }
  #logoFallback { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.4s; }
  #logoFallback.hidden { opacity: 0; }
  #startOverlay { position: fixed; inset: 0; z-index: 999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 36px; cursor: pointer; transition: opacity 1s ease; }
  #introLogo { width: 150px; height: 150px; object-fit: contain; border-radius: 50%; animation: logoPulse 2s ease-in-out infinite; box-shadow: 0 0 40px rgba(212,175,55,0.6); }
  .intro-text { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .intro-title { color: #d4af37; font-size: 1.4rem; letter-spacing: 0.2em; text-shadow: 0 0 20px rgba(212,175,55,0.8); }
  .intro-tap { display: flex; align-items: center; gap: 10px; animation: tapBounce 1.5s ease-in-out infinite; }
  .intro-tap span { color: #a07830; font-size: 0.9rem; letter-spacing: 0.15em; }
  @keyframes logoPulse { 0%,100%{transform:scale(1);box-shadow:0 0 30px rgba(212,175,55,0.5)} 50%{transform:scale(1.08);box-shadow:0 0 60px rgba(212,175,55,0.9)} }
  @keyframes tapBounce { 0%,100%{transform:translateY(0);opacity:1} 50%{transform:translateY(-8px);opacity:0.7} }
  #ui { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 24px 16px 36px; gap: 14px; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 45%, transparent 70%); pointer-events: none; opacity: 0; }
  #ui.show { opacity: 1; transition: opacity 2.5s ease 0.5s; pointer-events: auto; }

  #statusRing { display: none; }

  #responseBubble.visible { opacity: 1; pointer-events: auto; }
  .action-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
  .btn-circle { width: 128px; height: 128px; border-radius: 50%; border: 2px solid #d4af37; background: rgba(10,8,0,0.7); color: #d4af37; font-size: 3.2rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 16px rgba(212,175,55,0.2); transition: all 0.2s; }
  .btn-circle.active { background: rgba(79,195,247,0.2); border-color: #4fc3f7; color: #4fc3f7; }
  .btn-label { font-size: 1.2rem; color: #8a6818; letter-spacing: 0.12em; text-transform: uppercase; }
  #listeningOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  #listeningOverlay.show { display: flex; }
  .listening-text { font-size: 1.3rem; color: #4fc3f7; letter-spacing: 0.15em; text-shadow: 0 0 15px rgba(79,195,247,0.6); }
  .wave-bars { display: flex; gap: 5px; align-items: center; height: 40px; }
  .wave-bar { width: 7px; background: #4fc3f7; border-radius: 4px; animation: wave 0.8s ease-in-out infinite; }
  .wave-bar:nth-child(2){animation-delay:.1s} .wave-bar:nth-child(3){animation-delay:.2s} .wave-bar:nth-child(4){animation-delay:.3s} .wave-bar:nth-child(5){animation-delay:.4s}
  @keyframes wave { 0%,100%{height:8px} 50%{height:36px} }
  .cancel-btn { padding: 8px 26px; border: 1px solid rgba(212,175,55,0.4); border-radius: 20px; background: transparent; color: #8a6818; font-size: 0.82rem; cursor: pointer; }
  #photoPreview { display: none; position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%); width: 220px; z-index: 15; border-radius: 10px; overflow: hidden; border: 1px solid rgba(212,175,55,0.4); background: rgba(10,8,0,0.92); }

  #photoNome { font-size: 0.82rem; color: #f0d080; font-weight: bold; padding: 6px 10px 0; text-align: center; }
  #photoPrezzo { font-size: 0.9rem; color: #ffd700; font-weight: bold; padding: 2px 10px 6px; text-align: center; }
  #photoClose { position: absolute; top: 4px; right: 6px; color: #c8b060; font-size: 1.1rem; cursor: pointer; z-index: 16; }

<script>
// в”Җв”Җ Config в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let SERVER = 'https://silly-hobby-latino-comfort.trycloudflare.com';
const LINGUE = ['it','en','de','fr','es','nl','pl','cs','sk','hu','ro','bg','sl','hr','sr','bs','sq','el','uk','ru','et','lv','lt','sv','no','da','fi'];
const _lr = (navigator.language||'it').split('-')[0].toLowerCase();
const LANG = LINGUE.includes(_lr) ? _lr : 'it';

// в”Җв”Җ Video pool в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let V = SERVER + '/video/';
const POOL = {
  entrata:      [],
  breve:        [],
  lunga:        [],
  parlato:      [],
  medio:        [],
  sfondoVuoto:  [],
  offesaLieve:  [],
  offesaGrave:  [],
  offesaSeNeVa: [],
};

function aggiornaPool() {
  V = SERVER + '/video/';
  POOL.entrata      = [SERVER+'/video/entrata.mp4'];
  POOL.breve        = ['attesa1_3','attesa2_3','attesa1_4','attesa1_5'].map(n=>SERVER+'/video/'+n+'.mp4');
  POOL.lunga        = ['attesa1_9','attesa2_9','attesa3_9','attesa4_9'].map(n=>SERVER+'/video/'+n+'.mp4');
  POOL.parlato      = [1,2,3].map(i=>SERVER+'/video/parlato normale '+i+'.mp4');
  POOL.medio        = ['attesa1_6','attesa1_7','attesa2_7','attesa1_8'].map(n=>SERVER+'/video/'+n+'.mp4');
  POOL.sfondoVuoto  = [SERVER+'/video/sfondo vuoto.mp4'];
  POOL.offesaLieve  = [SERVER+'/video/offesa lieve.mp4'];
  POOL.offesaGrave  = [SERVER+'/video/offesa grave.mp4'];
  POOL.offesaSeNeVa = [SERVER+'/video/offesa e se ne va.mp4'];
}

let _lastRand = {};
const rand = (a, key='default') => {
  if (!a || a.length === 0) return null;
  if (a.length === 1) return a[0];
  let idx, tries = 0;
  do { idx = Math.floor(Math.random()*a.length); tries++; }
  while (a[idx] === _lastRand[key] && tries < 5);
  _lastRand[key] = a[idx];
  return a[idx];
};

// в”Җв”Җ Player crossfade в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const vidA = document.getElementById('vidA');
const vidB = document.getElementById('vidB');
const logoF = document.getElementById('logoFallback');
let activeSlot = null;
let loopOn = false;
let currentPool = null;

function crossfadeTo(src, loop=true, onEnded=null, withAudio=false) {
  if (!src) return;
  const next = activeSlot==='A' ? vidB : vidA;
  const prev = activeSlot==='A' ? vidA  : vidB;
  next.src = src; next.loop = loop; next.muted = !withAudio; next.load();
  next.oncanplay = () => {
    next.oncanplay = null;
    next.play().catch(()=>{});
    next.classList.remove('hidden'); next.classList.add('visible');
    logoF.classList.add('hidden');
    if (activeSlot !== null) {
      prev.classList.remove('visible'); prev.classList.add('hidden');
      setTimeout(()=>{ prev.pause(); prev.src=''; prev.muted=true; }, 500);
    }
    activeSlot = activeSlot==='A' ? 'B' : 'A';
    if (!loop && onEnded) next.onended = onEnded;
  };
}

function loopPool(pool) {
  loopOn = true; currentPool = pool;
  const curr = activeSlot === 'A' ? vidA : vidB;
  if (curr && !curr.paused && !curr.ended && curr.src) {
    curr.onended = () => { if (loopOn && currentPool === pool) _playNext(pool); };
    return;
  }
  _playNext(pool);
}

function _playNext(pool) {
  if (!loopOn) return;
  const src = rand(pool);
  if (!src) return;
  const next = activeSlot==='A' ? vidB : vidA;
  const prev = activeSlot==='A' ? vidA  : vidB;
  next.src = src; next.loop = false; next.muted = true; next.load();
  next.oncanplay = () => {
    next.oncanplay = null;
    next.play().catch(()=>{});
    next.classList.remove('hidden'); next.classList.add('visible');
    logoF.classList.add('hidden');
    if (activeSlot !== null) {
      prev.classList.remove('visible'); prev.classList.add('hidden');
      setTimeout(()=>{ prev.pause(); prev.src=''; }, 1000);
    }
    activeSlot = activeSlot==='A' ? 'B' : 'A';
    next.onended = () => { if (loopOn && currentPool === pool) _playNext(pool); };
  };
}
function stopLoop() { loopOn = false; }

// в”Җв”Җ Audio foresta в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const GITHUB_BASE = 'https://fdnegozi-stack.github.io/lafataeildrago-backend';
let forestAudio = null;
let forestAvviata = false;   // impedisce nuovi tentativi dopo che la foresta ГЁ partita o ha rinunciato
let offlineVideoAvviato = false; // impedisce di rilanciare il video offline ad ogni retry

function startForest(offline=false) {
  if (forestAudio || forestAvviata) return;
  forestAvviata = true; // blocca subito i retry di avvia()
  // In modalitГ  offline usa GitHub Pages, altrimenti prova SERVER poi GitHub
  const sources = offline
    ? [GITHUB_BASE + '/forest.mp3']
    : [SERVER + '/app/forest.mp3', GITHUB_BASE + '/forest.mp3'];
  let srcIdx = 0, attempts = 0;
  function tryLoad() {
    attempts++;
    console.log(`Foresta tentativo ${attempts} da: ${sources[srcIdx]}`);
    try {
      const audio = new Audio(sources[srcIdx]);
      audio.loop = true; audio.volume = 0.25;
      audio.onerror = () => {
        // Prova sorgente successiva se disponibile
        if (srcIdx < sources.length - 1) {
          srcIdx++;
          console.log(`Foresta: provo sorgente alternativa (${sources[srcIdx]})`);
          setTimeout(tryLoad, 1000);
        } else if (attempts < 5) {
          console.log(`Foresta retry ${attempts}...`);
          setTimeout(tryLoad, 3000);
        } else {
          console.log('Foresta non disponibile вҖ” rinuncio');
          forestAvviata = false; // permetti nuovo tentativo al prossimo avvia()
        }
      };
      audio.play()
        .then(() => {
          forestAudio = audio; // assegna solo quando parte davvero
          console.log('вң“ Foresta avviata da:', sources[srcIdx]);
        })
        .catch(e => {
          console.log('Foresta play fallito:', e.message);
          if (attempts < 5) setTimeout(tryLoad, 3000);
          else forestAvviata = false;
        });
    } catch(e) {
      console.log('Foresta errore:', e.message);
      if (attempts < 5) setTimeout(tryLoad, 3000);
      else forestAvviata = false;
    }
  }
  tryLoad();
}
document.addEventListener('visibilitychange', () => {
  if (!forestAudio) return;
  if (document.hidden) forestAudio.pause();
  else forestAudio.play().catch(()=>{});
});

// Ferma tutto quando la pagina viene chiusa/nascosta
window.addEventListener('pagehide', () => {
  if (forestAudio) { forestAudio.pause(); forestAudio.src = ''; }
});
window.addEventListener('beforeunload', () => {
  if (forestAudio) { forestAudio.pause(); forestAudio.src = ''; }
});

// в”Җв”Җ Avvio в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function caricaTunnelUrl() {
  for (let attempt = 1; attempt <= 5; attempt++) {
    try {
      const r = await fetch('https://fdnegozi-stack.github.io/lafataeildrago-backend/tunnel-url.json?t='+Date.now()+'&r='+Math.random(), {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
      });
      const d = await r.json();
      if (d.url && d.url !== SERVER) {
        SERVER = d.url;
        console.log('вң“ Tunnel URL:', SERVER);
        return;
      } else if (d.url) {
        console.log('вң“ Tunnel URL invariato:', SERVER);
        return;
      }
    } catch(e) {
      console.log(`tunnel-url tentativo ${attempt} fallito:`, e.message);
      if (attempt < 5) await new Promise(r => setTimeout(r, 2000));
    }
  }
  console.log('вҡ  Uso URL fallback:', SERVER);
}

async function avvia() {
  const o = document.getElementById('startOverlay');
  if (o) { o.style.opacity='0'; o.style.pointerEvents='none'; setTimeout(()=>o.remove(),1000); }

  // Sblocca autoplay audio
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    await ctx.resume();
    const buf = ctx.createBuffer(1,1,22050);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0);
    console.log('вң“ Audio sbloccato');
  } catch(e) { console.log('Audio unlock errore:', e.message); }

  await caricaTunnelUrl();
  aggiornaPool();

  // Verifica se il server ГЁ raggiungibile
  let serverOnline = false;
  try {
    const ping = await fetch(SERVER+'/api/ping', { signal: AbortSignal.timeout(5000) });
    serverOnline = ping.ok;
  } catch(e) {}

  if (!serverOnline) {
    console.log('вҡ  Server non raggiungibile вҖ” modalitГ  offline');
    // Avvia foresta da GitHub Pages (una sola volta)
    startForest(true);
    // Avvia video sfondo vuoto da GitHub Pages in loop (una sola volta)
    if (!offlineVideoAvviato) {
      offlineVideoAvviato = true;
      const offlineVideoUrl = GITHUB_BASE + '/sfondo%20vuoto.mp4';
      console.log('рҹ“ә Carico video offline:', offlineVideoUrl);
      crossfadeTo(offlineVideoUrl, true);
    }
    // Riprova connessione ogni 30 secondi
    setTimeout(avvia, 30000);
    return;
  }
  // Se torniamo online dopo essere stati offline, resetta i flag
  offlineVideoAvviato = false;

  startForest();
  document.getElementById('ui').classList.add('show');
  document.getElementById('logoTop').classList.add('show');
  setStatus('idle');
  setTimeout(() => {
    [...POOL.lunga, ...POOL.breve].forEach(src => fetch(src).catch(()=>{}));
    console.log('рҹ“Ұ Precaricamento video avviato');
  }, 2000);
  crossfadeTo(POOL.entrata[0], false, ()=>loopPool(POOL.lunga));
}

const storiaCon = [];

// в”Җв”Җ Offese в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Normalizza testo prima del check:
// converte forme censurate (es. "c***" вҶ’ "cazzo") e rimuove asterischi residui
function normalizzaOffesa(t) {
  return t
    .replace(/c[*вҖўВ·_-]{3,}/gi,   'cazzo')
    .replace(/f[*вҖўВ·_-]{3,}/gi,   'fuck')
    .replace(/b[*вҖўВ·_-]{3,}/gi,   'bitch')
    .replace(/s[*вҖўВ·_-]{3,}/gi,   'stronza')
    .replace(/p[*вҖўВ·_-]{3,}/gi,   'puttana')
    .replace(/v[*вҖўВ·_-]{3,}/gi,   'vaffanculo')
    .replace(/k[*вҖўВ·_-]{3,}/gi,   'kurwa')
    .replace(/m[*вҖўВ·_-]{3,}/gi,   'merda')
    .replace(/[*вҖўВ·_-]{2,}/g,     ''); // rimuove asterischi residui
}
const RE_GRAVE = /\bcazzo\b|vaffanculo|\btroia\b|\bputtana\b|\bbastarda\b|\bstronza\b|figlio di puttana|porco dio|porco cane|porco miseria|\bmerda\b|pezzo di merda|vai a fanculo|\bfanculo\b|affanculo|\bfuck\b|\bbitch\b|\basshole\b|motherfucker|scheiГҹkerl|\bscheiГҹe\b|hurensohn|\bwichser\b|arschloch|\bschlampe\b|\bfotze\b|halt die fresse|\bconnard\b|\benculГ©\b|\bsalopard\b|\bputain\b|\bmerde\b|ta gueule|ferme la gueule|va te faire foutre|\bklootzak\b|godverdomme|\bkut\b(?! e)|\blul\b|\beikel\b|hijo de puta|\bgilipollas\b|\bkurwa\b|\bjebany\b|\bpierdol\b|skurwysyn|\bchuj\b|zajebany|\bkurva\b|\bpicsa\b|bassza meg|\bwhore\b|\bcunt\b|\bdickhead\b|bastard[oe]|\bskiderik\b|\bkГҰft\b|forbandede|\bjГӨvla\b|\bhelvete\b|fan ta dig|dra ГҘt helvete/i;
const RE_SENEVA = /\bvattene\b|\bsparisci\b|shut up|tais.toi|halt die klappe|\bsmettila\b|lasciami in pace|leave me alone|lass mich in ruhe|fiche.moi la paix/i;
const RE_MEDIA = /stupida|cretina|idiota|scema|deficiente|imbecille|rincoglionita|mongoloide|mentecatta|sciacquetta|ignorante|incompetente|inutile|schifo|disgustosa|orribile|brutta|antipatica|odiosa|insopportabile|ridicola|assurda|patetica|dumb|stupid|idiot|useless|ugly|hГӨsslich|nutzlos|bescheuert|deppert|trottel|vollidiot|doofkopf|blГ¶d|doof|dumm|idiote|nulle|laide|bГӘte|conne|dГ©bile|abrutie|dom|lelijk|nutteloos|stom|idioot|sufferd|inГәtil|fea|gЕӮupia|gЕӮupi|beznadziejny|nieuЕјyteczna|brzydka|debilna|hloupГЎ|oЕЎklivГЎ|neschopnГЎ|pitomГЎ|buta|csГәnya|haszontalan|hГјlye|ostoba|grim|ubrugelig|fult|vГӨrdelГ¶s|fГҘnig|idiotisk/i;
let offesaCount = 0;
function offesa(t) {
  const tn = normalizzaOffesa(t);
  if (RE_GRAVE.test(tn)) {
    offesaCount++;
    return offesaCount >= 2 ? 'seNeVa' : 'grave';
  }
  // seNeVa solo se frase esplicitamente aggressiva E giГ  preceduta da offesa
  if (RE_SENEVA.test(tn) && offesaCount > 0) { return 'seNeVa'; }
  if (RE_MEDIA.test(tn)) { offesaCount++; return 'media'; }
  offesaCount = 0;
  return null;
}

// в”Җв”Җ Fetch SSE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function fetchSSE(url, body, onToken, onDone, onError) {
  try {
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const text = await res.text();
    let full = '', videoHash = null;
    for (const line of text.split('\n')) {
      if (!line.startsWith('data: ')) continue;
      try {
        const j = JSON.parse(line.slice(6));
        if (j.token) full += j.token;
        if (j.videoHash) videoHash = j.videoHash;
        if (j.error) { onError(j.error); return; }
      } catch(e){}
    }
    if (full.trim()) { onToken(full); onDone(videoHash); return; }
    try { const j=JSON.parse(text); const r=j.answer||j.text||''; if(r){onToken(r);onDone(null);return;} if(j.error){onError(j.error);return;} } catch(e){}
    onError('Nessuna risposta');
  } catch(e) { onError(e.message); }
}

// в”Җв”Җ TTS + lipsync в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function randParlato() {
  const r = Math.random();
  if (r < 0.4) return POOL.parlato[0];
  if (r < 0.8) return POOL.parlato[1];
  return POOL.parlato[2];
}

async function speak(testo, tipo='normale', videoHash=null) {
  setStatus('speak');

  if (tipo === 'foto') {
    // Frase foto: solo TTS audio, Tania resta sul video di attesa
    loopPool(POOL.lunga);
    try {
      const r = await fetch(SERVER+'/api/tts', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text:testo, lang:LANG })
      });
      if (r.ok) {
        const blob = await r.blob();
        if (blob.size > 0) {
          const url = URL.createObjectURL(blob);
          const aud = new Audio(url);
          await new Promise(resolve => {
            aud.onended = ()=>{ URL.revokeObjectURL(url); resolve(); };
            setTimeout(resolve, 30000);
            aud.play().catch(()=>resolve());
          });
        }
      }
    } catch(e) { console.log('TTS foto errore:', e.message); }
    setStatus('idle');
    return;
  }

  // Risposta vocale: cerca video lipsync in cache, NON genera al volo
  stopLoop();
  loopPool(POOL.lunga); // resta sul video di attesa finchГ© non trova lipsync

  let videoUsato = false;

  // Se non abbiamo videoHash, il video non ГЁ in cache (risposta generata al volo da Ollama)
  // вҶ’ accoda per la routine notturna e vai subito al fallback TTS
  if (!videoHash) {
    console.log('рҹҺ¬ Nessun videoHash вҖ” accodo per routine notturna, uso TTS fallback');
    // Accoda silenziosamente per generazione notturna
    fetch(SERVER+'/api/tts-lipsync', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text: testo, lang: LANG, noGenerate: false })
    }).catch(()=>{});
  } else {
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 12000);
    // Usa videoHash dal server se disponibile, altrimenti manda il testo
    const lsBody = videoHash
      ? { hash: videoHash, lang: LANG, noGenerate: true }
      : { text: testo, lang: LANG, tipo, noGenerate: true };
    const lsRes = await fetch(SERVER+'/api/tts-lipsync', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(lsBody),
      signal: ctrl.signal
    });
    clearTimeout(timeout);
    const lsData = await lsRes.json();
    console.log('рҹҺ¬ lipsync:', lsData.ok ? 'trovato' : 'non trovato', lsData.videoUrl||'');

    if (lsData.ok && lsData.videoUrl) {
      // Video lipsync trovato вҖ” riproducilo CON audio
      videoUsato = true;
      await new Promise(resolve => {
        const lsVid = document.createElement('video');
        lsVid.src = SERVER + lsData.videoUrl;
        lsVid.muted = false;
        lsVid.playsInline = true;
        lsVid.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:5;transition:opacity 0.8s ease;';
        document.body.appendChild(lsVid);
        lsVid.oncanplay = () => { lsVid.play().catch(e => console.log('lipsync play errore:', e.message)); };
        lsVid.onended = () => {
          // Dissolvenza in uscita
          lsVid.style.opacity = '0';
          setTimeout(() => {
            lsVid.remove();
            loopPool(POOL.lunga); setStatus('idle'); resolve();
          }, 800);
        };
        lsVid.onerror = () => { lsVid.remove(); resolve(); };
        setTimeout(() => { lsVid.style.opacity='0'; setTimeout(()=>{ lsVid.remove(); resolve(); }, 800); }, 30000);
      });
      return;
    }
  } catch(e) { console.log('lipsync errore:', e.message); }
  } // fine blocco videoHash

  // Fallback: solo audio TTS, Tania resta sul video parlato
  console.log('рҹ”Ҡ Fallback TTS audio');
  try {
    const r = await fetch(SERVER+'/api/tts', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text:testo, lang:LANG })
    });
    if (r.ok) {
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const aud = new Audio(url);
      await new Promise(resolve => {
        aud.onended = ()=>{ URL.revokeObjectURL(url); resolve(); };
        setTimeout(resolve, 30000);
        aud.play().catch(()=>resolve());
      });
    }
  } catch(e) { console.log('TTS fallback errore:', e.message); }
  setStatus('idle');
  loopPool(POOL.lunga);
}

// в”Җв”Җ Camera в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function openCamera() { if (!isBusy) camInp.click(); }
function chiudiPreview() { document.getElementById('photoPreview').classList.remove('show'); }

camInp.addEventListener('change', async () => {
  const file = camInp.files[0]; if (!file) return;

  const prevDiv   = document.getElementById('photoPreview');
  const prevImg   = document.getElementById('photoImg');

  prevNome.textContent = ''; prevPrezzo.textContent = '';
  prevDiv.classList.add('show');
  prevRes.textContent = 'рҹ”Қ Analisi...';
  try {
    const fd = new FormData(); fd.append('image', file);
    const res = await fetch(SERVER+'/api/search', { method:'POST', body:fd });
    const data = await res.json();

    const top = lista.length > 0 ? lista[0] : null;
    const riconosciuto = top && (top.similarity == null || top.similarity >= SOGLIA);

    if (riconosciuto) {
      top.nome = top.nome || top.descrizione || 'Prodotto';
      prevNome.textContent = top.nome;
      prevPrezzo.textContent = top.prezzo ? `вӮ¬ ${parseFloat(top.prezzo).toFixed(2)}` : '';
      prevRes.textContent = `sim: ${top.similarity != null ? (top.similarity*100).toFixed(0)+'%' : '?'}`;
      setStatus('speak');
      loopPool(POOL.lunga);

      try {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 60000);
        const r2 = await fetch(SERVER+'/api/avatar-response', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ prodotto:top, lingua:LANG, mode:'mobile' }),
          signal: ctrl.signal
        });
        clearTimeout(t);
        if (r2 && r2.ok) {
          const t2 = await r2.text();
          let frase1 = '', frase2 = '';
          for (const line of t2.split('\n')) {
            if (!line.startsWith('data: ')) continue;
            try { const j=JSON.parse(line.slice(6)); if(j.frase1) frase1=j.frase1; if(j.frase2) frase2=j.frase2; if(j.token) frase1+=j.token; } catch{}
          }
          console.log('рҹ“· Frase1:', frase1.substring(0,60));
          console.log('рҹ“· Frase2:', frase2.substring(0,60));

          // Frase1: usa lipsync se in cache, altrimenti salta
          if (frase1.trim()) {
            const lsCheck = await fetch(SERVER+'/api/tts-lipsync', {
              method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({ text:frase1.trim(), lang:LANG, noGenerate:true })
            }).catch(()=>null);
            const lsData = lsCheck ? await lsCheck.json().catch(()=>({})) : {};
            if (lsData.ok && lsData.videoUrl) {
              await new Promise(resolve => {
                stopLoop();
                crossfadeTo(SERVER+lsData.videoUrl, false, ()=>{ loopPool(POOL.lunga); resolve(); }, true);
              });
            } else if (lsData.audioUrl) {
              const aud = new Audio(SERVER + lsData.audioUrl);
              await new Promise(resolve => { aud.onended=resolve; setTimeout(resolve,30000); aud.play().catch(()=>resolve()); });
            }
          }

          // Frase2: zoom foto + TTS
          if (frase2.trim()) {
            const imgUrl = SERVER + '/img-locali/' + top.id + '.jpg';
            const imgTest = new Image();
            await new Promise(resolve => { imgTest.onload=resolve; imgTest.onerror=resolve; imgTest.src=imgUrl; setTimeout(resolve,2000); });
            if (imgTest.complete && imgTest.naturalWidth > 0) {
              prevImg.style.transition='opacity 0.4s'; prevImg.style.opacity='0';
              await new Promise(r=>setTimeout(r,400));
              prevImg.src=imgUrl; prevImg.style.opacity='1';
            }
            prevDiv.style.cssText='transition:all 0.6s ease;position:fixed;top:0;left:0;width:100vw;height:62vh;bottom:auto;transform:none;border-radius:0 0 16px 16px;z-index:11';
            prevImg.style.cssText='width:100%;height:100%;object-fit:contain;background:rgba(0,0,0,0.95)';
            await new Promise(r=>setTimeout(r,600));
            await speak(frase2.trim(), 'foto');
          }
        }
      } catch(e) { console.log('рҹ“· errore avatar:', e.message); }
    } else {
      prevRes.textContent = top ? `sim: ${(top.similarity*100).toFixed(0)}% вҖ” sotto soglia` : 'Nessun risultato';
      const MSG = { it:"Non ho riconosciuto l'articolo. Prova a fotografarlo da piГ№ vicino!", en:"I didn't recognize this item. Try taking a closer photo!", de:"Ich habe den Artikel nicht erkannt. Versuche ein nГӨheres Foto!" };
      await speak(MSG[LANG]||MSG.it, 'foto');
    }
  } catch(e) { prevRes.textContent = 'Errore: '+e.message; console.log('рҹ“· errore:', e.message); }
  finally {
    const pd = document.getElementById('photoPreview');
    if (pd) pd.style.cssText='';
    const pi = document.getElementById('photoImg');
    if (pi) pi.style.cssText='';
    isBusy=false; setStatus('idle'); camInp.value='';

});

// в”Җв”Җ Microfono в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
let rec = null;

function startListening() {
  if (isBusy) return;
  if (!SR) { alert('Usa Chrome per il riconoscimento vocale.'); return; }

  // Sblocca audio ad ogni tap sul microfono
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    ctx.resume().then(() => {
      const buf = ctx.createBuffer(1,1,22050);
      const src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination); src.start(0);
    });
  } catch(e) {}

  rec = new SR();
  rec.lang=LANG; rec.continuous=false; rec.interimResults=false; rec.maxAlternatives=1;

  rec.onstart = () => { isBusy=true; micBtn.classList.add('active'); overlay.classList.add('show'); setStatus('listen'); loopPool(POOL.lunga); };

  rec.onresult = async event => {
    const testo = event.results[0][0].transcript.trim();
    overlay.classList.remove('show'); micBtn.classList.remove('active');
    if (!testo || testo.length < 2) { isBusy=false; setStatus('idle'); return; }
    setStatus('think'); loopPool(POOL.lunga);
    console.log('рҹҺӨ Trascritto:', testo);

    // Controlla offese
    const off = offesa(testo);
    if (off) {
      stopLoop();
      if (off === 'seNeVa') {
        crossfadeTo(rand(POOL.offesaSeNeVa), false, ()=>{ crossfadeTo(rand(POOL.sfondoVuoto),true); setTimeout(()=>loopPool(POOL.lunga),10000); });
      } else {
        const pool = off==='grave' ? POOL.offesaGrave : POOL.offesaLieve;
        crossfadeTo(rand(pool), false, ()=>loopPool(POOL.lunga));
      }
      isBusy=false; setStatus('idle'); return;
    }

    storiaCon.push({ role:'user', content:testo });
    if (storiaCon.length > 8) storiaCon.splice(0,2);

    let risposta = '';
    await fetchSSE(
      SERVER+'/api/voice-answer',
      { text:testo, lang:LANG, mode:'mobile', storia:storiaCon.slice(-8) },
      t => { risposta += t; },
      async (videoHash) => {
        storiaCon.push({ role:'assistant', content:risposta });
        console.log('рҹ’¬ Risposta:', risposta.substring(0,60));
        await speak(risposta, 'normale', videoHash);
        isBusy=false; setStatus('idle');
      },
      err => { console.log('вқҢ Errore:', err); isBusy=false; setStatus('idle'); loopPool(POOL.lunga); }
    );
  };

  rec.onerror = e => {
    overlay.classList.remove('show'); micBtn.classList.remove('active');
    isBusy=false; setStatus('idle'); loopPool(POOL.lunga);
    if (e.error==='not-allowed') console.log('Permesso microfono negato.');
    else console.log('Errore mic:', e.error);
  };

  rec.onend = () => {
    overlay.classList.remove('show'); micBtn.classList.remove('active');
  };

  rec.start();
}

function cancelListening() {
  if (rec) rec.abort();
  overlay.classList.remove('show'); micBtn.classList.remove('active');
  setStatus('idle'); isBusy=false; loopPool(POOL.lunga);
}
