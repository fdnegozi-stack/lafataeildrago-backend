<style>

  #startOverlay { position: fixed; inset: 0; z-index: 999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 36px; cursor: pointer; transition: opacity 1s ease; }
  #introLogo { width: 150px; height: 150px; object-fit: contain; border-radius: 50%; animation: logoPulse 2s ease-in-out infinite; box-shadow: 0 0 40px rgba(212,175,55,0.6); }

  .btn-label { font-size: 1.2rem; color: #8a6818; letter-spacing: 0.12em; text-transform: uppercase; }

  .listening-text { font-size: 1.3rem; color: #4fc3f7; letter-spacing: 0.15em; text-shadow: 0 0 15px rgba(79,195,247,0.6); }

  .wave-bar:nth-child(2){animation-delay:.1s} .wave-bar:nth-child(3){animation-delay:.2s} .wave-bar:nth-child(4){animation-delay:.3s} .wave-bar:nth-child(5){animation-delay:.4s}
  @keyframes wave { 0%,100%{height:8px} 50%{height:36px} }
  .cancel-btn { padding: 8px 26px; border: 1px solid rgba(212,175,55,0.4); border-radius: 20px; background: transparent; color: #8a6818; font-size: 0.82rem; cursor: pointer; }
  #photoPreview { display: none; position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%); width: 220px; z-index: 15; border-radius: 10px; overflow: hidden; border: 1px solid rgba(212,175,55,0.4); background: rgba(10,8,0,0.92); }

  #photoClose { position: absolute; top: 4px; right: 6px; color: #c8b060; font-size: 1.1rem; cursor: pointer; z-index: 16; }

<script>
// ── Config ───────────────────────────────────────────────────────
let SERVER = 'https://silly-hobby-latino-comfort.trycloudflare.com';
const LINGUE = ['it','en','de','fr','es','nl','pl','cs','sk','hu','ro','bg','sl','hr','sr','bs','sq','el','uk','ru','et','lv','lt','sv','no','da','fi'];
const _lr = (navigator.language||'it').split('-')[0].toLowerCase();
const LANG = LINGUE.includes(_lr) ? _lr : 'it';

// ── Video pool ────────────────────────────────────────────────────
let V = SERVER + '/video/';
const POOL = {
  entrata:      [],
  breve:        [],
  lunga:        [],
  parlato:      [],
  medio:        [],
  sfondoVuoto:  [],
  offesaLieve:  [],
  offesaGrave:  [],
  offesaSeNeVa: [],
};

function aggiornaPool() {
  V = SERVER + '/video/';
  POOL.entrata      = [SERVER+'/video/entrata.mp4'];
  POOL.breve        = ['attesa1_3','attesa2_3','attesa1_4','attesa1_5'].map(n=>SERVER+'/video/'+n+'.mp4');
  POOL.lunga        = ['attesa1_9','attesa2_9','attesa3_9','attesa4_9'].map(n=>SERVER+'/video/'+n+'.mp4');
  POOL.parlato      = [1,2,3].map(i=>SERVER+'/video/parlato normale '+i+'.mp4');
  POOL.medio        = ['attesa1_6','attesa1_7','attesa2_7','attesa1_8'].map(n=>SERVER+'/video/'+n+'.mp4');
  POOL.sfondoVuoto  = [SERVER+'/video/sfondo vuoto.mp4'];
  POOL.offesaLieve  = [SERVER+'/video/offesa lieve.mp4'];
  POOL.offesaGrave  = [SERVER+'/video/offesa grave.mp4'];
  POOL.offesaSeNeVa = [SERVER+'/video/offesa e se ne va.mp4'];
}

let _lastRand = {};
const rand = (a, key='default') => {
  if (!a || a.length === 0) return null;
  if (a.length === 1) return a[0];
  let idx, tries = 0;
  do { idx = Math.floor(Math.random()*a.length); tries++; }
  while (a[idx] === _lastRand[key] && tries < 5);
  _lastRand[key] = a[idx];
  return a[idx];
};

// ── Player crossfade ──────────────────────────────────────────────
const vidA = document.getElementById('vidA');
const vidB = document.getElementById('vidB');
const logoF = document.getElementById('logoFallback');
let activeSlot = null;
let loopOn = false;
let currentPool = null;

function crossfadeTo(src, loop=true, onEnded=null, withAudio=false) {
  if (!src) return;
  const next = activeSlot==='A' ? vidB : vidA;
  const prev = activeSlot==='A' ? vidA  : vidB;
  next.src = src; next.loop = loop; next.muted = !withAudio; next.load();
  next.oncanplay = () => {
    next.oncanplay = null;
    next.play().catch(()=>{});
    next.classList.remove('hidden'); next.classList.add('visible');
    logoF.classList.add('hidden');
    if (activeSlot !== null) {
      prev.classList.remove('visible'); prev.classList.add('hidden');
      setTimeout(()=>{ prev.pause(); prev.src=''; prev.muted=true; }, 500);
    }
    activeSlot = activeSlot==='A' ? 'B' : 'A';
    if (!loop && onEnded) next.onended = onEnded;
  };
}

function loopPool(pool) {
  loopOn = true; currentPool = pool;
  const curr = activeSlot === 'A' ? vidA : vidB;
  if (curr && !curr.paused && !curr.ended && curr.src) {
    curr.onended = () => { if (loopOn && currentPool === pool) _playNext(pool); };
    return;
  }
  _playNext(pool);
}

function _playNext(pool) {
  if (!loopOn) return;
  const src = rand(pool);
  if (!src) return;
  const next = activeSlot==='A' ? vidB : vidA;
  const prev = activeSlot==='A' ? vidA  : vidB;
  next.src = src; next.loop = false; next.muted = true; next.load();
  next.oncanplay = () => {
    next.oncanplay = null;
    next.play().catch(()=>{});
    next.classList.remove('hidden'); next.classList.add('visible');
    logoF.classList.add('hidden');
    if (activeSlot !== null) {
      prev.classList.remove('visible'); prev.classList.add('hidden');
      setTimeout(()=>{ prev.pause(); prev.src=''; }, 1000);
    }
    activeSlot = activeSlot==='A' ? 'B' : 'A';
    next.onended = () => { if (loopOn && currentPool === pool) _playNext(pool); };
  };
}
function stopLoop() { loopOn = false; }

// ── Audio foresta ─────────────────────────────────────────────────
let forestAudio = null;

// ── Frasi di attesa ───────────────────────────────────────────────
const FRASI_ATTESA = {
  it: [
    'Vediamo cosa posso trovare...',
    'Un momento, sto cercando...',
    'Sto consultando il mio grimorio...',
    'Un istante di magia...',
    'Lasciami scorrere tra le pagine del catalogo...',
    'Hmm, interessante... un attimo...',
  ],
  en: ['Let me check for you...','One moment, searching...','Let me consult my magical catalogue...'],
  de: ['Einen Moment bitte...','Ich schaue kurz nach...','Lass mich im Katalog suchen...'],
  fr: ['Un instant, je cherche...','Laissez-moi vérifier...','Je consulte mon catalogue magique...'],
  es: ['Un momento, buscando...','Déjame comprobar...','Consultando mi catálogo mágico...'],
  nl: ['Een moment, ik zoek...','Laat me even kijken...','Een magisch moment...'],
  pl: ['Chwileczkę, szukam...','Pozwól, że sprawdzę...','Chwila magii...'],
  cs: ['Chvilku, hledám...','Dovolte mi zkontrolovat...'],
  hu: ['Egy pillanat, keresem...','Hadd nézzem meg...'],
};

// ── Video frasi di attesa pre-generate ───────────────────────────
// I file sono in /cache/attesa/ con nomi fissi it_attesa_1..6
const N_ATTESA = 3;
let attesaTimer   = null;
let attesaVideo   = null;
let attesaPromise = null; // resolve chiamata quando il video finisce

function avviaFraseAttesa() {
  // Parte dopo 6 secondi — se la risposta arriva prima, non parte nulla
  // Usa un video lipsync pre-generato (no TTS on-demand)
  attesaTimer = setTimeout(() => {
    const n   = Math.floor(Math.random() * N_ATTESA) + 1;
    const src = SERVER + '/cache/attesa/it_attesa_' + n + '.mp4';
    // Usa crossfadeTo con callback onEnded per sapere quando il video finisce
    attesaPromise = new Promise(resolve => {
      crossfadeTo(src, false, () => {
        attesaVideo = null;
        resolve();
        // Dopo la frase di attesa torna al loop di attesa
        loopPool(POOL.lunga);
      }, true); // withAudio=true per sentire l'audio
      attesaVideo = true; // segnale che il video è partito
    });
  }, 6000);
}

async function fermaFraseAttesa() {
  if (attesaTimer) { clearTimeout(attesaTimer); attesaTimer = null; }
  // Se il video di attesa è già partito, aspetta che finisca (non si interrompe a metà)
  if (attesaVideo && attesaPromise) {
    await attesaPromise;
  }
  attesaVideo   = null;
  attesaPromise = null;
}

function startForest() {
  if (forestAudio) return;
  let attempts = 0;
  function tryLoad() {
    attempts++;
    try {
      forestAudio = new Audio(SERVER + '/app/forest.mp3');
      forestAudio.loop = true; forestAudio.volume = 0.25;
      forestAudio.onerror = () => {
        forestAudio = null;
        if (attempts < 5) {
          console.log(`Foresta retry ${attempts}...`);
          setTimeout(tryLoad, 3000);
        } else {
          console.log('Foresta non disponibile');
        }
      };
      forestAudio.play()
        .then(()=>console.log('✓ Foresta avviata'))
        .catch(e=>{ forestAudio=null; if(attempts<5) setTimeout(tryLoad,3000); });
    } catch(e){ forestAudio=null; if(attempts<5) setTimeout(tryLoad,3000); }
  }
  tryLoad();
}
document.addEventListener('visibilitychange', () => {
  if (!forestAudio) return;
  if (document.hidden) forestAudio.pause();
  else forestAudio.play().catch(()=>{});
});

// Ferma tutto quando la pagina viene chiusa/nascosta
window.addEventListener('pagehide', () => {
  if (forestAudio) { forestAudio.pause(); forestAudio.src = ''; }
});
window.addEventListener('beforeunload', () => {
  if (forestAudio) { forestAudio.pause(); forestAudio.src = ''; }
});

// ── Avvio ─────────────────────────────────────────────────────────
async function caricaTunnelUrl() {
  for (let attempt = 1; attempt <= 5; attempt++) {
    try {
      const r = await fetch('https://fdnegozi-stack.github.io/lafataeildrago-backend/tunnel-url.json?t='+Date.now()+'&r='+Math.random(), {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
      });
      const d = await r.json();
      if (d.url && d.url !== SERVER) {
        SERVER = d.url;
        console.log('✓ Tunnel URL:', SERVER);
        return;
      } else if (d.url) {
        console.log('✓ Tunnel URL invariato:', SERVER);
        return;
      }
    } catch(e) {
      console.log(`tunnel-url tentativo ${attempt} fallito:`, e.message);
      if (attempt < 5) await new Promise(r => setTimeout(r, 2000));
    }
  }
  console.log('⚠ Uso URL fallback:', SERVER);
}

async function avvia() {
  const o = document.getElementById('startOverlay');
  if (o) { o.style.opacity='0'; o.style.pointerEvents='none'; setTimeout(()=>o.remove(),1000); }

  // Sblocca autoplay audio
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    await ctx.resume();
    const buf = ctx.createBuffer(1,1,22050);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0);
    console.log('✓ Audio sbloccato');
  } catch(e) { console.log('Audio unlock errore:', e.message); }

  await caricaTunnelUrl();
  aggiornaPool();

  // Verifica se il server è raggiungibile
  let serverOnline = false;
  try {
    const ping = await fetch(SERVER+'/api/ping', { signal: AbortSignal.timeout(5000) });
    serverOnline = ping.ok;
  } catch(e) {}

  if (!serverOnline) {
    window._avviaTentativo = (window._avviaTentativo || 0) + 1;
    const delay = window._avviaTentativo <= 12 ? 5000 : 30000;
    console.log(`⚠ Server non raggiungibile — riprovo tra ${delay/1000}s (tentativo ${window._avviaTentativo})`);
    startForest();
    setTimeout(avvia, delay);
    return;
  }

  startForest();
  document.getElementById('ui').classList.add('show');
  document.getElementById('logoTop').classList.add('show');
  setStatus('idle');
  setTimeout(() => {
    [...POOL.lunga, ...POOL.breve].forEach(src => fetch(src).catch(()=>{}));
    console.log('📦 Precaricamento video avviato');
  }, 2000);
  crossfadeTo(POOL.entrata[0], false, ()=>loopPool(POOL.lunga));
}

// ── Stato ─────────────────────────────────────────────────────────
let isBusy = false;
let followUpTimer = null;
let ultimoTipoArticolo = null; // contesto per follow-up ("draghi", "fate", ecc.)
let followUpUsato = false;     // evita ripetizione consecutiva
const storiaCon = [];

// ── Negozio corrente (da URL ?negozio=Ba o Bc) ──────────────────
const NEGOZIO = new URLSearchParams(window.location.search).get('negozio') || '';
const ring    = document.getElementById('statusRing');
const bubble  = document.getElementById('responseBubble');
const overlay = document.getElementById('listeningOverlay');
const micBtn  = document.getElementById('micBtn');
const camInp  = document.getElementById('cameraInput');
const setStatus = s => { ring.className=''; ring.classList.add('show',s); };
const showText  = t => {};

// ── Offese ────────────────────────────────────────────────────────
// Normalizza testo prima del check offese:
// rimuove asterischi di censura (es. "f***" → "f", poi matchato da pattern troncati)
// e converte forme censurate comuni nel termine completo
function normalizzaOffesa(t) {
  return t
    .replace(/c[*•·_-]{3,}/gi,   'cazzo')
    .replace(/f[*•·_-]{3,}/gi,   'fuck')
    .replace(/b[*•·_-]{3,}/gi,   'bitch')
    .replace(/s[*•·_-]{3,}/gi,   'stronza')
    .replace(/p[*•·_-]{3,}/gi,   'puttana')
    .replace(/v[*•·_-]{3,}/gi,   'vaffanculo')
    .replace(/k[*•·_-]{3,}/gi,   'kurwa')
    .replace(/[*•·_-]{2,}/g,     ''); // rimuove asterischi residui
}
const RE_GRAVE = /cazzo|vaffanculo|troia|puttana|bastarda|stronza|figlio di puttana|porco dio|porco cane|mannaggia|fuck|bitch|asshole|motherfucker|scheißkerl|scheiße|hurensohn|wichser|connard|enculé|salopard|hijo de puta|gilipollas|kurwa|jebany|whore|cunt|dickhead|bastard[oe]|pezzo di merda|vai a fanculo|fanculo|affanculo|skiderik|kæft|forbandede|jävla|helvete|fan ta dig|dra åt helvete/i;
const RE_MEDIA = /stupida|cretina|idiota|scema|deficiente|imbecille|rincoglionita|mongoloide|mentecatta|sciacquetta|ignorante|incompetente|inutile|schifo|disgustosa|orribile|brutta|antipatica|odiosa|insopportabile|ridicola|assurda|patetica|dumb|stupid|idiot|useless|ugly|hässlich|nutzlos|bescheuert|deppert|trottel|vollidiot|doofkopf|blöd|doof|dumm|idiote|nulle|laide|bête|conne|débile|abrutie|dom|lelijk|nutteloos|stom|idioot|sufferd|inútil|fea|głupia|głupi|beznadziejny|nieużyteczna|brzydka|debilna|hloupá|ošklivá|neschopná|pitomá|buta|csúnya|haszontalan|hülye|ostoba|grim|ubrugelig|fult|värdelös|fånig|idiotisk/i;
let offesaCount = 0;
function offesa(t) {
  const tn = normalizzaOffesa(t);
  if (RE_GRAVE.test(tn)) { offesaCount++; return offesaCount >= 2 ? 'seNeVa' : 'grave'; }
  if (RE_MEDIA.test(tn)) { offesaCount++; return 'media'; }
  offesaCount = 0; return null;
}

// ── Fetch SSE ─────────────────────────────────────────────────────
async function fetchSSE(url, body, onToken, onDone, onError, _tentativo=0) {
  try {
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const text = await res.text();
    let full = '', videoHash = null, serviceVideo = null, prodottiRisposta = null, followUp = false, followUpTipo = 'generale';
    for (const line of text.split('\n')) {
      if (!line.startsWith('data: ')) continue;
      try {
        const j = JSON.parse(line.slice(6));
        if (j.token) full += j.token;
        if (j.videoHash) videoHash = j.videoHash;
        if (j.followUp) followUp = true;
        if (j.followUpTipo) followUpTipo = j.followUpTipo;
        if (j.serviceVideo) serviceVideo = j.serviceVideo;
        if (j.prodotti) prodottiRisposta = j.prodotti;
        if (j.error) { onError(j.error); return; }
      } catch(e){}
    }
    if (full.trim()) { onToken(full); onDone(videoHash, serviceVideo, prodottiRisposta, followUp, followUpTipo); return; }
    try { const j=JSON.parse(text); const r=j.answer||j.text||''; if(r){onToken(r);onDone(null);return;} if(j.error){onError(j.error);return;} } catch(e){}
    onError('Nessuna risposta');
  } catch(e) {
    // Retry automatico una volta dopo 2s (per disconnessioni temporanee del tunnel)
    if (_tentativo === 0) {
      console.warn('⚠ fetchSSE fallito, retry tra 2s:', e.message);
      await new Promise(r => setTimeout(r, 2000));
      return fetchSSE(url, body, onToken, onDone, onError, 1);
    }
    onError(e.message);
  }
}

function caroselloNext() {
  if (!_carProdotti.length) return;
  _carIdx = (_carIdx + 1) % _carProdotti.length;
  _renderCar();
}
function caroselloPrev() {
  if (!_carProdotti.length) return;
  _carIdx = (_carIdx - 1 + _carProdotti.length) % _carProdotti.length;
  _renderCar();
}

function _carTouchStart(e) { _carSwipeX = e.touches[0].clientX; }
function _carTouchEnd(e) {
  if (_carSwipeX === null) return;
  const dx = e.changedTouches[0].clientX - _carSwipeX;
  _carSwipeX = null;
  if (dx < -45) caroselloNext();
  else if (dx > 45) caroselloPrev();
}

function _renderCar() {
  const track = document.getElementById('carosello-track');
  const indice = document.getElementById('carosello-indice');
  const p = _carProdotti[_carIdx];

  const imgUrl = SERVER + '/img-locali/' + p.id + '.jpg';

  track.innerHTML = `
    <div class="car-card" onclick="commentaArticolo(${_carIdx})">
      <img src="${imgUrl}" alt="${p.descrizione}"
        onerror="this.src='';this.style.minHeight='180px';this.style.background='#1a1520';">

        <div class="car-prezzo">€${parseFloat(p.prezzo||0).toFixed(2)}</div>

  if (indice) indice.textContent = `${_carIdx + 1} / ${_carProdotti.length}`;
}

async function commentaArticolo(idx) {
  const p = _carProdotti[idx];
  if (!p || isBusy) return;
  isBusy = true;
  const g   = p.giacenzaProprio || 0;
  const tot = g + (p.giacenzaAltro || 0);

  if (tot === 1 && g === 1)      audioId = 'it_servizio_ultimo_pezzo';

async function speak(testo, tipo='normale', videoHash=null) {
  await fermaFraseAttesa(); // aspetta eventuale video di attesa prima di parlare
  setStatus('speak');

  if (tipo === 'foto') {
    // Frase foto: solo TTS audio, Tania resta sul video di attesa
    loopPool(POOL.lunga);
    try {
      const r = await fetch(SERVER+'/api/tts', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text:testo, lang:LANG })
      });
      if (r.ok) {
        const blob = await r.blob();
        if (blob.size > 0) {
          const url = URL.createObjectURL(blob);
          const aud = new Audio(url);
          await new Promise(resolve => {
            aud.onended = ()=>{ URL.revokeObjectURL(url); resolve(); };
            setTimeout(resolve, 30000);
            aud.play().catch(()=>resolve());
          });
        }
      }
    } catch(e) { console.log('TTS foto errore:', e.message); }
    setStatus('idle');
    return;
  }

  // Risposta vocale: cerca video lipsync in cache, NON genera al volo
  stopLoop();
  loopPool(POOL.lunga); // resta sul video di attesa finché non trova lipsync

  let videoUsato = false;

  // Se non abbiamo videoHash, il video non è in cache (risposta generata al volo da Ollama)
  // → accoda per la routine notturna e vai subito al fallback TTS
  // → qui partiamo con la frase di attesa perché il TTS potrebbe richiedere qualche secondo
  if (!videoHash) {
    console.log('🎬 Nessun videoHash — accodo per routine notturna, uso TTS fallback');
    avviaFraseAttesa(); // nessun video in cache → pronuncia frase di attesa durante TTS
    // Accoda silenziosamente per generazione notturna
    fetch(SERVER+'/api/tts-lipsync', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text: testo, lang: LANG, noGenerate: false })
    }).catch(()=>{});
  } else {
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 12000);
    // Usa videoHash dal server se disponibile, altrimenti manda il testo
    const lsBody = videoHash
      ? { hash: videoHash, lang: LANG, noGenerate: true }
      : { text: testo, lang: LANG, tipo, noGenerate: true };
    const lsRes = await fetch(SERVER+'/api/tts-lipsync', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(lsBody),
      signal: ctrl.signal
    });
    clearTimeout(timeout);
    const lsData = await lsRes.json();
    console.log('🎬 lipsync:', lsData.ok ? 'trovato' : 'non trovato', lsData.videoUrl||'');

    if (lsData.ok && lsData.videoUrl) {
      // Video lipsync trovato — riproducilo CON audio
      videoUsato = true;
      await new Promise(resolve => {
        const lsVid = document.createElement('video');
        lsVid.src = SERVER + lsData.videoUrl;
        lsVid.muted = false;
        lsVid.playsInline = true;
        lsVid.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:5;transition:opacity 0.8s ease;';
        document.body.appendChild(lsVid);
        lsVid.oncanplay = () => { lsVid.play().catch(e => console.log('lipsync play errore:', e.message)); };
        lsVid.onended = () => {
          // Dissolvenza in uscita
          lsVid.style.opacity = '0';
          setTimeout(() => {
            lsVid.remove();
            loopPool(POOL.lunga); setStatus('idle'); resolve();
          }, 800);
        };
        lsVid.onerror = () => { lsVid.remove(); resolve(); };
        setTimeout(() => { lsVid.style.opacity='0'; setTimeout(()=>{ lsVid.remove(); resolve(); }, 800); }, 30000);
      });
      return;
    }
  } catch(e) { console.log('lipsync errore:', e.message); }
  } // fine blocco videoHash

  // Fallback: solo audio TTS, Tania resta sul video parlato
  console.log('🔊 Fallback TTS audio');
  try {
    const r = await fetch(SERVER+'/api/tts', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text:testo, lang:LANG })
    });
    if (r.ok) {
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const aud = new Audio(url);
      await new Promise(resolve => {
        aud.onended = ()=>{ URL.revokeObjectURL(url); resolve(); };
        setTimeout(resolve, 30000);
        aud.play().catch(()=>resolve());
      });
    }
  } catch(e) { console.log('TTS fallback errore:', e.message); }
  setStatus('idle');
  loopPool(POOL.lunga);
}

// ── Microfono ─────────────────────────────────────────────────────
const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
let rec = null;

function startListening() {
  if (isBusy) return;
  if (!SR) { alert('Usa Chrome per il riconoscimento vocale.'); return; }

  // Sblocca audio ad ogni tap sul microfono
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    ctx.resume().then(() => {
      const buf = ctx.createBuffer(1,1,22050);
      const src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination); src.start(0);
    });
  } catch(e) {}

  rec = new SR();
  rec.lang=LANG; rec.continuous=false; rec.interimResults=false; rec.maxAlternatives=1;

  rec.onstart = () => { isBusy=true; cancellaFollowUpTimer(); micBtn.classList.add('active'); overlay.classList.add('show'); setStatus('listen'); loopPool(POOL.lunga); };

  rec.onresult = async event => {
    const testo = event.results[0][0].transcript.trim();
    overlay.classList.remove('show'); micBtn.classList.remove('active');
    if (!testo || testo.length < 2) { isBusy=false; setStatus('idle'); return; }
    setStatus('think'); loopPool(POOL.lunga);
    console.log('🎤 Trascritto:', testo);

    // Controlla offese
    const off = offesa(testo);
    if (off) {
      stopLoop();
      if (off === 'seNeVa') {
        crossfadeTo(rand(POOL.offesaSeNeVa), false, ()=>{ crossfadeTo(rand(POOL.sfondoVuoto),true); setTimeout(()=>loopPool(POOL.lunga),10000); });
      } else {
        const pool = off==='grave' ? POOL.offesaGrave : POOL.offesaLieve;
        crossfadeTo(rand(pool), false, ()=>loopPool(POOL.lunga));
      }
      isBusy=false; setStatus('idle'); return;
    }

    storiaCon.push({ role:'user', content:testo });
    if (storiaCon.length > 8) storiaCon.splice(0,2);

    let risposta = '';
    await fetchSSE(
      SERVER+'/api/voice-answer',
      { text:testo, lang:LANG, mode:'mobile', storia:storiaCon.slice(-8), negozio:NEGOZIO, contestoTipo:ultimoTipoArticolo },
      t => { risposta += t; },
      async (videoHash, serviceVideo, prodotti, followUp, followUpTipo) => {
        await fermaFraseAttesa(); // aspetta eventuale video di attesa prima di procedere
        storiaCon.push({ role:'assistant', content:risposta });
        console.log('💬 Risposta:', risposta.substring(0,60));
        cancellaFollowUpTimer();
        followUpUsato = false; // reset per nuova domanda
        if (serviceVideo) {
          await riproduciServizio(serviceVideo, risposta, prodotti);
        } else {
          await speak(risposta, 'normale', videoHash);
          // Avvia follow-up se il server lo segnala e non c'è carosello
          if (followUp && !prodotti?.length) {
            // Estrai tipo articolo dall'ultima domanda utente
            const ultimaDomanda = storiaCon.filter(s=>s.role==='user').slice(-1)[0]?.content || '';
            avviaFollowUp(ultimaDomanda, followUpTipo);
          }
        }
        isBusy=false; setStatus('idle');
      },
      err => { fermaFraseAttesa(); console.log('❌ Errore:', err); isBusy=false; setStatus('idle'); loopPool(POOL.lunga); } // fermaFraseAttesa non attesa in caso di errore
    );
  };

  rec.onerror = e => {
    overlay.classList.remove('show'); micBtn.classList.remove('active');
    isBusy=false; setStatus('idle'); loopPool(POOL.lunga);
    if (e.error==='not-allowed') console.log('Permesso microfono negato.');
    else console.log('Errore mic:', e.error);
  };

  rec.onend = () => {
    overlay.classList.remove('show'); micBtn.classList.remove('active');
  };

  rec.start();
}

function cancelListening() {
  if (rec) rec.abort();
  overlay.classList.remove('show'); micBtn.classList.remove('active');
  setStatus('idle'); isBusy=false; loopPool(POOL.lunga);
}
</script>

  <span id="carosello-chiudi" onclick="chiudiCarosello()">✕</span>
  <div id="carosello-track"></div>
  <div id="carosello-frecce">
    <span class="car-freccia" onclick="caroselloPrev()">‹</span>
    <span id="carosello-indice">1 / 1</span>
    <span class="car-freccia" onclick="caroselloNext()">›</span>
  </div>
</div>
