<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0800">
<title>La Fata & il Drago</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse at center, #1a1200 0%, #0a0800 60%, #000 100%);
    min-height: 100vh; font-family: 'Georgia', serif; color: #d4af37; overflow-x: hidden;
  }
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .particle {
    position: absolute; width: 2px; height: 2px; background: #d4af37;
    border-radius: 50%; opacity: 0; animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%{transform:translateY(100vh);opacity:0} 10%{opacity:0.5} 90%{opacity:0.2} 100%{transform:translateY(-5vh);opacity:0}
  }
  .main {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding: 24px 16px 40px; gap: 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 40%, transparent 70%);
    pointer-events: none;
  }
  .main > * { pointer-events: auto; }
  .logo-top {
    position: fixed; top: 14px; left: 16px; z-index: 20;
    width: 52px; height: 52px; border-radius: 50%;
    border: 1px solid rgba(212,175,55,0.5);
    box-shadow: 0 0 12px rgba(212,175,55,0.3);
    overflow: hidden; background: rgba(0,0,0,0.4);
  }
  .logo-top img { width: 100%; height: 100%; object-fit: cover; }
  .titolo-basso {
    font-size: 1.1rem; letter-spacing: 0.18em; color: #d4af37;
    text-shadow: 0 0 15px rgba(212,175,55,0.8);
    font-family: 'Georgia', serif;
  }
  .avatar-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .avatar-frame {
    position: fixed; inset: 0; z-index: 0;
    width: 100vw; height: 100vh;
    background: #0a0800; overflow: hidden;
  }
  .vid-layer {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transition: opacity 0.4s ease-in-out;
  }
  .vid-layer.hidden { opacity: 0; }
  .vid-layer.visible { opacity: 1; }
  .logo-fallback {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transition: opacity 0.4s;
  }
  .logo-fallback.hidden { opacity: 0; }
  .status-ring {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    width: 12px; height: 12px; border-radius: 50%; background: #2a2a2a;
    border: 2px solid #444; transition: all 0.3s; z-index: 10;
  }
  .status-ring.idle   { background:#d4af37; box-shadow:0 0 6px #d4af37; animation:pulse 2s infinite; }
  .status-ring.listen { background:#4fc3f7; box-shadow:0 0 6px #4fc3f7; animation:pulse 0.5s infinite; }
  .status-ring.think  { background:#ce93d8; box-shadow:0 0 6px #ce93d8; }
  .status-ring.speak  { background:#a5d6a7; box-shadow:0 0 6px #a5d6a7; animation:pulse 0.3s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .tania-name { display: none; }
  .response-bubble {
    background: rgba(10,8,0,0.75); border: 1px solid rgba(212,175,55,0.4);
    border-radius: 12px; padding: 12px 16px; font-size: 0.95rem; line-height: 1.6;
    color: #f0e0b0; text-align: center; width: 100%; max-width: 420px; min-height: 54px;
    display: flex; align-items: center; justify-content: center; transition: opacity 0.4s;
    backdrop-filter: blur(4px); text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    opacity: 0; pointer-events: none;
  }
  .response-bubble.visible { opacity: 1; pointer-events: auto; }
  .action-buttons { display: flex; gap: 24px; align-items: flex-end; justify-content: center; }
  .action-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
  .action-btn .btn-circle {
    width: 64px; height: 64px; border-radius: 50%; border: 2px solid #d4af37;
    background: rgba(26,20,0,0.8); color: #d4af37; font-size: 1.6rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 16px rgba(212,175,55,0.2); transition: all 0.2s;
  }
  .action-btn .btn-circle:hover  { box-shadow: 0 0 24px rgba(212,175,55,0.5); transform: scale(1.05); }
  .action-btn .btn-circle.active { background: rgba(79,195,247,0.2); border-color: #4fc3f7; color: #4fc3f7; }
  .action-btn .btn-label { font-size: 0.68rem; color: #8a6818; letter-spacing: 0.12em; text-transform: uppercase; }
  .photo-preview { display: none; width: 100%; max-width: 320px; border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; overflow: hidden; }
  .photo-preview.show { display: block; }
  .photo-preview img { width: 100%; display: block; }
  .photo-result { padding: 10px 14px; background: rgba(26,20,0,0.9); font-size: 0.82rem; color: #c8b060; line-height: 1.5; text-align: center; }
  #cameraInput { display: none; }
  .listening-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100;
    flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  }
  .listening-overlay.show { display: flex; }
  .listening-text { font-size: 1.3rem; color: #4fc3f7; letter-spacing: 0.15em; text-shadow: 0 0 15px rgba(79,195,247,0.6); }
  .wave-bars { display: flex; gap: 5px; align-items: center; height: 40px; }
  .wave-bar { width: 7px; background: #4fc3f7; border-radius: 4px; animation: wave 0.8s ease-in-out infinite; }
  .wave-bar:nth-child(2){animation-delay:.1s} .wave-bar:nth-child(3){animation-delay:.2s}
  .wave-bar:nth-child(4){animation-delay:.3s} .wave-bar:nth-child(5){animation-delay:.4s}
  @keyframes wave { 0%,100%{height:8px} 50%{height:36px} }
  .cancel-btn {
    padding: 8px 26px; border: 1px solid rgba(212,175,55,0.4); border-radius: 20px;
    background: transparent; color: #8a6818; font-size: 0.82rem; cursor: pointer;
  }

  @keyframes logoPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 30px rgba(212,175,55,0.5); }
    50% { transform: scale(1.08); box-shadow: 0 0 60px rgba(212,175,55,0.9); }
  }
  @keyframes tapBounce {
    0%,100% { transform: translateY(0); opacity:1; }
    50% { transform: translateY(-8px); opacity:0.7; }
  }
  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .fade-in { animation: fadeInUp 0.8s ease forwards; opacity:0; }
  .fade-in-1 { animation-delay: 0.2s; }
  .fade-in-2 { animation-delay: 0.6s; }
  .fade-in-3 { animation-delay: 1.0s; }
</style>
</head>
<body>
<!-- Schermata intro -->
<div id="startOverlay" onclick="rimuoviOverlay()" style="
  position:fixed;inset:0;z-index:999;
  background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;
  cursor:pointer;
">
  <img id="introLogo" src="stemma_trasparente.png" 
    alt="La Fata & il Drago"
    style="width:140px;height:140px;object-fit:contain;border-radius:50%;
    animation:logoPulse 2s ease-in-out infinite;
    box-shadow:0 0 40px rgba(212,175,55,0.6);"
  />
  <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
    <p style="color:#d4af37;font-family:Georgia,serif;font-size:1.4rem;letter-spacing:0.2em;text-shadow:0 0 20px rgba(212,175,55,0.8);">✦ la Fata &amp; il Drago ✦</p>
    <div style="display:flex;align-items:center;gap:10px;animation:tapBounce 1.5s ease-in-out infinite;">
      <span style="font-size:1.8rem;">👆</span>
      <span style="color:#a07830;font-family:Georgia,serif;font-size:0.9rem;letter-spacing:0.15em;">tocca per iniziare</span>
    </div>
  </div>
</div>
<div class="particles" id="particles"></div>
<input type="file" id="cameraInput" accept="image/*" capture="environment">

<!-- Video fullscreen background -->
<div class="avatar-frame" id="avatarFrame">
  <video class="vid-layer hidden" id="vidA" playsinline muted></video>
  <video class="vid-layer hidden" id="vidB" playsinline muted></video>
  <img class="logo-fallback" id="logoFallback" src="stemma_trasparente.png" alt="Tania"/>
  <div class="status-ring idle" id="statusRing"></div>
</div>

<div class="main">
  <!-- Logo in alto a sinistra -->
  <div class="logo-top">
    <img src="stemma_trasparente.png" alt="F&D"/>
  </div>

  <div class="response-bubble fade-in fade-in-1" id="responseBubble">

  </div>
  <div class="photo-preview" id="photoPreview">
    <img id="photoImg" src="" alt="foto prodotto"/>
    <div class="photo-result" id="photoResult"></div>
  </div>
  <div class="action-buttons fade-in fade-in-2">
    <div class="action-btn" onclick="openCamera()">
      <div class="btn-circle" id="cameraBtn">📷</div>
      <span class="btn-label">Fotografa</span>
    </div>
    <div class="action-btn" onclick="startListening()">
      <div class="btn-circle" id="micBtn">🎙️</div>
      <span class="btn-label">Chiedi</span>
    </div>
  </div>
  <p class="titolo-basso fade-in fade-in-3">✦ la Fata &amp; il Drago ✦</p>
</div>

<div class="listening-overlay" id="listeningOverlay">
  <p class="listening-text">Sto ascoltando...</p>
  <div class="wave-bars">
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div>
  </div>
  <button class="cancel-btn" onclick="cancelListening()">✕ Annulla</button>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────
function rimuoviOverlay() {
  const o = document.getElementById('startOverlay');
  if (o) {
    o.style.transition = 'opacity 1s ease';
    o.style.opacity = '0';
    o.style.pointerEvents = 'none';
    setTimeout(() => o.remove(), 1000);
  }
  startForest();
  // Avvia il video dopo il primo tocco
  const t = document.createElement('video');
  t.src = POOL.entrata[0];
  t.oncanplay = () => crossfadeTo(POOL.entrata[0], false, ()=>loopPool(POOL.breve));
  t.onerror   = () => loopPool(POOL.breve);
}

// Sospendi/riprendi audio quando app va in background
document.addEventListener('visibilitychange', () => {
  if (!actx) return;
  if (document.hidden) {
    actx.suspend();
  } else {
    actx.resume();
  }
});

const SERVER = 'https://common-gore-productive-streets.trycloudflare.com';
const LINGUE_SUPPORTATE = ['it','en','de','fr','es','nl','pl','cs','sk','hu','ro','bg','sl','hr','sr','bs','sq','el','uk','ru','et','lv','lt','sv','no','da','fi'];
const _langRaw = (navigator.language || 'it').split('-')[0].toLowerCase();
const LANG = LINGUE_SUPPORTATE.includes(_langRaw) ? _langRaw : 'it';

// ── Preload video in background ─────────────────────────────────
function preloadVideos() {
  const tuttiIVideo = [
    'attesa breve 1.mp4','attesa breve 2.mp4','attesa breve 3.mp4',
    'attesa breve 4.mp4','attesa breve 5.mp4',
    'in attesa lunga 1.mp4','in attesa lunga 2.mp4',
    'entrata.mp4','parlato normale 1.mp4','parlato normale 2.mp4',
    'parlato con enfasi.mp4'
  ];
  // Precarica in sequenza con bassa priorità
  let i = 0;
  function preloadNext() {
    if (i >= tuttiIVideo.length) return;
    const v = document.createElement('video');
    v.preload = 'auto';
    v.muted = true;
    v.src = SERVER + '/video/' + tuttiIVideo[i];
    v.load();
    v.oncanplaythrough = () => { i++; setTimeout(preloadNext, 200); };
    v.onerror = () => { i++; setTimeout(preloadNext, 200); };
  }
  preloadNext();
}

// ── Video pool ───────────────────────────────────────────────────
// SERVER è già definito sopra — i video vengono serviti dal tunnel
const V = SERVER + '/video/';
const POOL = {
  entrata:      [V+'entrata.mp4'],
  breve:        [V+'attesa breve 1.mp4',V+'attesa breve 2.mp4',V+'attesa breve 3.mp4',V+'attesa breve 4.mp4',V+'attesa breve 5.mp4'],
  lunga:        [V+'in attesa lunga 1.mp4',V+'in attesa lunga 2.mp4',V+'in attesa lunga 3.mp4',V+'in attesa lunga 4.mp4'],
  parlato:      [V+'parlato normale 1.mp4',V+'parlato normale 2.mp4'],
  enfasi:       [V+'parlato con enfasi.mp4'],
  offesaLieve:  [V+'offesa lieve.mp4'],
  offesaMedia:  [V+'offesa media.mp4'],
  offesaGrave:  [V+'offesa grave.mp4'],
};
const rand = arr => arr[Math.floor(Math.random()*arr.length)];

// ── Player crossfade ─────────────────────────────────────────────
const vidA = document.getElementById('vidA');
const vidB = document.getElementById('vidB');
const logo = document.getElementById('logoFallback');
let activeSlot = null; // 'A' o 'B'
let loopOn = false;

function crossfadeTo(src, loop=true, onEnded=null) {
  const next = activeSlot==='A' ? vidB : vidA;
  const prev = activeSlot==='A' ? vidA  : vidB;
  next.src = src; next.loop = loop; next.muted = true; next.load();
  next.oncanplay = () => {
    next.play().catch(()=>{});
    next.classList.remove('hidden'); next.classList.add('visible');
    logo.classList.add('hidden');
    if (activeSlot !== null) {
      prev.classList.remove('visible'); prev.classList.add('hidden');
      setTimeout(()=>{ prev.pause(); prev.src=''; }, 500);
    }
    activeSlot = activeSlot==='A' ? 'B' : 'A';
    if (!loop && onEnded) next.onended = onEnded;
  };
}

function loopPool(pool) {
  loopOn = true;
  function playNext() {
    if (!loopOn) return;
    const next = activeSlot==='A' ? vidB : vidA;
    const prev = activeSlot==='A' ? vidA  : vidB;
    next.src = rand(pool); next.loop = false; next.muted = true; next.load();
    next.oncanplay = () => {
      next.play().catch(()=>{});
      next.classList.remove('hidden'); next.classList.add('visible');
      logo.classList.add('hidden');
      if (activeSlot !== null) {
        prev.classList.remove('visible'); prev.classList.add('hidden');
        setTimeout(()=>{ prev.pause(); prev.src=''; }, 500);
      }
      activeSlot = activeSlot==='A' ? 'B' : 'A';
      next.onended = playNext;
    };
  }
  playNext();
}
function stopLoop() { loopOn = false; }

// ── Sottofondo bosco ─────────────────────────────────────────────
let forestAudio = null;
// actx stub per compatibilità con visibilitychange
const actx = {
  suspend: () => { if (forestAudio) forestAudio.pause(); },
  resume:  () => { if (forestAudio) forestAudio.play().catch(()=>{}); }
};
function startForest() {
  if (forestAudio) return;
  try {
    forestAudio = new Audio('the-voices-of-birds-in-the-forest-7715.mp3');
    forestAudio.loop   = true;
    forestAudio.volume = 0.18;
    forestAudio.play().catch(() => {});
  } catch(e) {}
}

// ── Particelle ───────────────────────────────────────────────────
const pc = document.getElementById('particles');
for (let i=0;i<25;i++) {
  const p = document.createElement('div'); p.className='particle';
  p.style.cssText=`left:${Math.random()*100}%;animation-duration:${10+Math.random()*14}s;animation-delay:${Math.random()*12}s;`;
  pc.appendChild(p);
}

// ── Stato ────────────────────────────────────────────────────────
let isBusy = false;
const storiaCon = []; // storia conversazione per contesto
const MAX_STORIA = 4; // ultimi 4 scambi
const ring   = document.getElementById('statusRing');
const bubble = document.getElementById('responseBubble');
const overlay= document.getElementById('listeningOverlay');
const micBtn = document.getElementById('micBtn');
const camInp = document.getElementById('cameraInput');
const prevDiv= document.getElementById('photoPreview');
const prevImg= document.getElementById('photoImg');
const prevRes= document.getElementById('photoResult');

const setStatus = s => ring.className = 'status-ring '+s;
const showText  = t => {
  bubble.textContent = t;
  if (t) bubble.classList.add('visible');
  else bubble.classList.remove('visible');
};

// ── Rilevamento offese ───────────────────────────────────────────
const RE_GRAVE = /cazzo|vaffanculo|troia|puttana|bastard|merda.*tua|fuck.*you|scheiss|merde|joder|kurwa/i;
const RE_MEDIA = /stupida|cretina|idiota|scema|deficiente|inutile|brutta|schifo|bitch|dumb|blöd/i;
const RE_LIEVE = /robot|macchina|stupida app|non servi|boring|pathetic/i;
function offesa(t) {
  if (RE_GRAVE.test(t)) return 'grave';
  if (RE_MEDIA.test(t)) return 'media';
  if (RE_LIEVE.test(t)) return 'lieve';
  return null;
}

// ── Fetch SSE ────────────────────────────────────────────────────
async function fetchSSE(url, body, onToken, onDone, onError) {
  try {
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const text = await res.text();
    let full = '';
    for (const line of text.split('\n')) {
      if (!line.startsWith('data: ')) continue;
      try { const j=JSON.parse(line.slice(6)); if(j.token) full+=j.token; if(j.error){onError(j.error);return;} } catch(e){}
    }
    if (full.trim()) { onToken(full); onDone(); return; }
    try { const j=JSON.parse(text); const r=j.answer||j.text||''; if(r){onToken(r);onDone();return;} if(j.error){onError(j.error);return;} } catch(e){}
    onError('Nessuna risposta');
  } catch(e) { onError(e.message); }
}

// ── TTS audio + lip-sync background (Soluzione B) ───────────────
async function speak(testo, tipo='normale') {
  // Avvia lip-sync in background
  fetch(SERVER+'/api/tts-lipsync', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ text:testo, lang:LANG, tipo })
  }).then(async r => {
    const d = await r.json();
    if (d.ok && d.videoUrl) {
      crossfadeTo(SERVER+d.videoUrl, false, ()=>{ loopPool(POOL.breve); setStatus('idle'); });
    }
  }).catch(()=>{});

  // Audio TTS subito
  try {
    const r = await fetch(SERVER+'/api/tts', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text:testo, lang:LANG })
    });
    if (r.ok) {
      const blob = await r.blob();
      const url  = URL.createObjectURL(blob);
      const aud  = new Audio(url);
      loopPool(POOL.breve); setStatus('speak');
      aud.play();
      aud.onended = () => { URL.revokeObjectURL(url); setStatus('idle'); };
      return;
    }
  } catch(e){}
  setStatus('idle');
}

// ── Avvio ────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Avvia preload video in background
  setTimeout(preloadVideos, 500);

  // Foresta avviata dall'overlay iniziale o dal primo click
  const t = document.createElement('video');
  t.src = POOL.entrata[0];
  t.oncanplay = () => crossfadeTo(POOL.entrata[0], false, ()=>loopPool(POOL.breve));
  t.onerror   = () => loopPool(POOL.breve);
});

// ── Camera ───────────────────────────────────────────────────────
function openCamera() { if (!isBusy) camInp.click(); }
camInp.addEventListener('change', async () => {
  const file = camInp.files[0]; if (!file) return;
  isBusy=true; setStatus('think'); loopPool(POOL.lunga);
  prevImg.src = URL.createObjectURL(file);
  prevDiv.classList.add('show');
  prevRes.textContent='🔍 Sto cercando il prodotto...';
  showText('Analisi in corso...');
  try {
    const fd = new FormData(); fd.append('image', file);
    const res = await fetch(SERVER+'/api/search', { method:'POST', body:fd });
    const data = await res.json();
    if (data.results?.length > 0) {
      const top = data.results[0];
      setStatus('speak'); showText('');
      await fetchSSE(SERVER+'/api/avatar-response', { prodotto:top, lingua:LANG, mode:'mobile' },
        t=>{ bubble.textContent+=t; },
        ()=>{ speak(bubble.textContent); },
        ()=>{ showText('Ho trovato: '+top.nome); }
      );
      prevRes.textContent=`${top.nome} — €${top.prezzo}`;
    } else {
      showText('Non ho riconosciuto il prodotto. Riprova con una foto più nitida.');
      prevRes.textContent='Prodotto non riconosciuto';
    }
  } catch(e) { showText('Errore durante la ricerca.'); prevRes.textContent=''; }
  isBusy=false; setStatus('idle'); camInp.value='';
});

// ── Microfono ────────────────────────────────────────────────────
const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
let rec = null;

function startListening() {
  if (isBusy) return;
  startForest();
  if (!SR) { showText('⚠️ Browser non supporta riconoscimento vocale. Usa Chrome.'); return; }
  rec = new SR();
  rec.lang=LANG; rec.continuous=false; rec.interimResults=false; rec.maxAlternatives=1;

  rec.onstart = () => {
    isBusy=true; micBtn.classList.add('active');
    overlay.classList.add('show'); setStatus('listen');
    loopPool(POOL.breve);
  };

  rec.onresult = async event => {
    const testo = event.results[0][0].transcript.trim();
    overlay.classList.remove('show'); micBtn.classList.remove('active');
    if (!testo||testo.length<2) { showText('Non ho capito. Puoi ripetere?'); isBusy=false; setStatus('idle'); return; }

    setStatus('think'); loopPool(POOL.lunga);

    // Gestione offese
    const off = offesa(testo);
    if (off) {
      stopLoop();
      const pool = off==='grave'?POOL.offesaGrave : off==='media'?POOL.offesaMedia : POOL.offesaLieve;
      crossfadeTo(rand(pool), false, ()=>loopPool(POOL.breve));
    }

    let risposta = '';
    // Aggiorna storia conversazione
    storiaCon.push({ role: 'user', content: testo });
    if (storiaCon.length > MAX_STORIA * 2) storiaCon.splice(0, 2);

    await fetchSSE(
      SERVER+'/api/voice-answer', { text:testo, lang:LANG, mode:'mobile', storia: storiaCon.slice(-MAX_STORIA*2) },
      t => { risposta+=t; showText(risposta); },
      () => {
        const isEnfasi = /harry potter|signore degli anelli|witcher|dungeons|esclusiv|novit/i.test(risposta);
        speak(risposta, isEnfasi?'enfasi':'normale');
      },
      err => { showText('⚠️ '+err); }
    );
    if (!risposta) showText('⚠️ Nessuna risposta dal server.');
    isBusy=false; setStatus('idle');
  };

  rec.onerror = e => {
    overlay.classList.remove('show'); micBtn.classList.remove('active');
    isBusy=false; setStatus('idle'); loopPool(POOL.breve);
    if (e.error==='no-speech') showText('Non ho sentito nulla. Riprova.');
    else if (e.error==='not-allowed') showText('⚠️ Permesso microfono negato.');
    else showText('Errore microfono. Riprova.');
  };

  rec.onend = () => {
    overlay.classList.remove('show'); micBtn.classList.remove('active');
    if (isBusy) { isBusy=false; setStatus('idle'); }
  };

  rec.start();
}

function cancelListening() {
  if (rec) rec.abort();
  overlay.classList.remove('show'); micBtn.classList.remove('active');
  setStatus('idle'); isBusy=false; loopPool(POOL.breve);
}
</script>
</body>
</html>
