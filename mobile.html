<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>La Fata & il Drago</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; min-height: 100vh; font-family: 'Georgia', serif; color: #d4af37; overflow: hidden; }

  /* ── Video fullscreen background ── */
  #avatarFrame {
    position: fixed; inset: 0; z-index: 0;
    width: 100vw; height: 100vh; background: #000; overflow: hidden;
  }
  .vid-layer {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transition: opacity 0.15s linear;
  }
  .vid-layer.hidden  { opacity: 0; pointer-events: none; }
  .vid-layer.visible { opacity: 1; }
  #logoFallback {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transition: opacity 0.4s;
  }
  #logoFallback.hidden { opacity: 0; }

  /* ── Overlay intro ── */
  #startOverlay {
    position: fixed; inset: 0; z-index: 999;
    background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 36px;
    cursor: pointer; transition: opacity 1s ease;
  }
  #introLogo {
    width: 150px; height: 150px; object-fit: contain; border-radius: 50%;
    animation: logoPulse 2s ease-in-out infinite;
    box-shadow: 0 0 40px rgba(212,175,55,0.6);
  }
  .intro-text {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .intro-title {
    color: #d4af37; font-size: 1.4rem; letter-spacing: 0.2em;
    text-shadow: 0 0 20px rgba(212,175,55,0.8);
  }
  .intro-tap {
    display: flex; align-items: center; gap: 10px;
    animation: tapBounce 1.5s ease-in-out infinite;
  }
  .intro-tap span { color: #a07830; font-size: 0.9rem; letter-spacing: 0.15em; }

  @keyframes logoPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 30px rgba(212,175,55,0.5); }
    50% { transform: scale(1.08); box-shadow: 0 0 60px rgba(212,175,55,0.9); }
  }
  @keyframes tapBounce {
    0%,100% { transform: translateY(0); opacity: 1; }
    50% { transform: translateY(-8px); opacity: 0.7; }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── UI overlay ── */
  #ui {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding: 24px 16px 36px; gap: 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 45%, transparent 70%);
    pointer-events: none; opacity: 0;
  }
  #ui.show { opacity: 1; transition: opacity 2.5s ease 0.5s; pointer-events: auto; }
  .action-buttons { display: flex; gap: 24px; align-items: flex-end; justify-content: center; opacity: 0; transform: translateY(20px); transition: opacity 2s ease 1.5s, transform 2s ease 1.5s; }
  #ui.show .action-buttons { opacity: 1; transform: translateY(0); }
  .titolo-basso { font-size: 1rem; letter-spacing: 0.18em; color: #d4af37; text-shadow: 0 0 12px rgba(212,175,55,0.7); opacity: 0; transform: translateY(10px); transition: opacity 2s ease 2.5s, transform 2s ease 2.5s; }
  #ui.show .titolo-basso { opacity: 1; transform: translateY(0); }

  /* Logo in alto */
  #logoTop {
    position: fixed; top: 14px; left: 16px; z-index: 20;
    width: 60px; height: 60px;
    opacity: 0; transition: opacity 1s ease;
  }
  #logoTop.show { opacity: 1; }
  #logoTop img { width: 100%; height: 100%; object-fit: contain; }

  /* Status ring */
  #statusRing { display: none; } /* puntino rimosso */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Bolla risposta */
  #responseBubble {
    background: rgba(10,8,0,0.78); border: 1px solid rgba(212,175,55,0.4);
    border-radius: 12px; padding: 12px 16px; font-size: 0.95rem; line-height: 1.6;
    color: #f0e0b0; text-align: center; width: 100%; max-width: 420px; min-height: 54px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px); text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    opacity: 0; transition: opacity 0.4s; pointer-events: none;
  }
  #responseBubble.visible { opacity: 1; pointer-events: auto; }

  /* Pulsanti */
  .action-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
  .btn-circle {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid #d4af37; background: rgba(10,8,0,0.7);
    color: #d4af37; font-size: 1.6rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 16px rgba(212,175,55,0.2); transition: all 0.2s;
  }
  .btn-circle.active { background: rgba(79,195,247,0.2); border-color: #4fc3f7; color: #4fc3f7; }
  .btn-label { font-size: 0.68rem; color: #8a6818; letter-spacing: 0.12em; text-transform: uppercase; }

  /* Titolo sotto */

  /* Overlay ascolto */
  #listeningOverlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100;
    flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  }
  #listeningOverlay.show { display: flex; }
  .listening-text { font-size: 1.3rem; color: #4fc3f7; letter-spacing: 0.15em; text-shadow: 0 0 15px rgba(79,195,247,0.6); }
  .wave-bars { display: flex; gap: 5px; align-items: center; height: 40px; }
  .wave-bar { width: 7px; background: #4fc3f7; border-radius: 4px; animation: wave 0.8s ease-in-out infinite; }
  .wave-bar:nth-child(2){animation-delay:.1s} .wave-bar:nth-child(3){animation-delay:.2s}
  .wave-bar:nth-child(4){animation-delay:.3s} .wave-bar:nth-child(5){animation-delay:.4s}
  @keyframes wave { 0%,100%{height:8px} 50%{height:36px} }
  .cancel-btn {
    padding: 8px 26px; border: 1px solid rgba(212,175,55,0.4); border-radius: 20px;
    background: transparent; color: #8a6818; font-size: 0.82rem; cursor: pointer;
  }

  /* Preview foto */
  #photoPreview { display: none; position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%); width: 200px; z-index: 15; border-radius: 10px; overflow: hidden; border: 1px solid rgba(212,175,55,0.3); }
  #photoPreview.show { display: block; }
  #photoPreview img { width: 100%; display: block; }
  #photoResult { padding: 8px; background: rgba(10,8,0,0.9); font-size: 0.78rem; color: #c8b060; text-align: center; }

  #cameraInput { display: none; }
</style>
</head>
<body>

<!-- Intro overlay -->
<div id="startOverlay" onclick="avvia()">
  <img id="introLogo" src="logo.png" alt="La Fata & il Drago"/>
  <div class="intro-text">
    <p class="intro-title">✦ la Fata &amp; il Drago ✦</p>
    <div class="intro-tap">
      <span style="font-size:1.8rem">👆</span>
      <span>tocca per iniziare</span>
    </div>
  </div>
</div>

<!-- Video background -->
<div id="avatarFrame">
  <video class="vid-layer hidden" id="vidA" playsinline muted></video>
  <video class="vid-layer hidden" id="vidB" playsinline muted></video>
  <video id="vidPreload" playsinline muted preload="auto" style="display:none"></video>
  <img id="logoFallback" src="logo.png" alt="Tania" style="object-fit:contain;padding:20%;"/>
</div>

<!-- Logo top left -->
<div id="logoTop">
  <img src="logo.png" alt="F&D"/>
</div>

<!-- Status ring -->
<div id="statusRing"></div>

<!-- UI overlay -->
<div id="ui">
  <div id="responseBubble"></div>
  <div class="action-buttons">
    <div class="action-btn" onclick="openCamera()">
      <div class="btn-circle" id="cameraBtn">📷</div>
      <span class="btn-label">Fotografa</span>
    </div>
    <div class="action-btn" onclick="startListening()">
      <div class="btn-circle" id="micBtn">🎙️</div>
      <span class="btn-label">Chiedi</span>
    </div>
  </div>
  <p class="titolo-basso">✦ la Fata &amp; il Drago ✦</p>
</div>

<!-- Overlay ascolto -->
<div id="listeningOverlay">
  <p class="listening-text">Sto ascoltando...</p>
  <div class="wave-bars">
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div>
  </div>
  <button class="cancel-btn" onclick="cancelListening()">✕ Annulla</button>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment">
<div id="photoPreview"><img id="photoImg" src="" alt=""/><div id="photoResult"></div></div>

<script>
// ── Config ───────────────────────────────────────────────────────
let SERVER = 'https://silly-hobby-latino-comfort.trycloudflare.com'; // fallback aggiornato
const LINGUE = ['it','en','de','fr','es','nl','pl','cs','sk','hu','ro','bg','sl','hr','sr','bs','sq','el','uk','ru','et','lv','lt','sv','no','da','fi'];
const _lr = (navigator.language||'it').split('-')[0].toLowerCase();
const LANG = LINGUE.includes(_lr) ? _lr : 'it';

// ── Video pool ────────────────────────────────────────────────────
const V = SERVER + '/video/';
const POOL = {
  entrata:     [V+'entrata.mp4'],
  breve:       [V+'attesa1_3.mp4',V+'attesa2_3.mp4',V+'attesa1_4.mp4',V+'attesa1_5.mp4'],
  lunga:       [V+'attesa1_9.mp4',V+'attesa2_9.mp4',V+'attesa3_9.mp4',V+'attesa4_9.mp4'],
  parlato:     [V+'parlato normale 1.mp4',V+'parlato normale 2.mp4',V+'parlato normale 3.mp4'],
  medio:       [V+'attesa1_6.mp4',V+'attesa1_7.mp4',V+'attesa2_7.mp4',V+'attesa1_8.mp4'],
  saluto:      [V+'saluto 1.mp4',V+'saluto 2.mp4'],
  qrcode:      [V+'qrcode.mp4'],
  sfondoVuoto: [V+'sfondo vuoto.mp4'],
  offesaLieve: [V+'offesa lieve.mp4'],
  offesaMedia: [],
  offesaGrave: [V+'offesa grave.mp4'],
  offesaSeNeVa: [V+'offesa e se ne va.mp4'],
};
let _lastRand = {};

// ── Cache video in memoria — evita ri-download ────────────────
const _videoCache = {};
async function _fetchVideo(src) {
  if (_videoCache[src]) return _videoCache[src];
  try {
    const resp = await fetch(src);
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    _videoCache[src] = url;
    return url;
  } catch(e) { return src; } // fallback all'URL originale
}
const rand = (a, key='default') => {
  if (a.length <= 1) return a[0];
  let idx, tries = 0;
  do { idx = Math.floor(Math.random()*a.length); tries++; }
  while (a[idx] === _lastRand[key] && tries < 5);
  _lastRand[key] = a[idx];
  return a[idx];
};

// ── Player crossfade ──────────────────────────────────────────────
const vidA = document.getElementById('vidA');
const vidB = document.getElementById('vidB');
const logoF = document.getElementById('logoFallback');
let activeSlot = null;
let loopOn = false;

function crossfadeTo(src, loop=true, onEnded=null) {
  const next = activeSlot==='A' ? vidB : vidA;
  const prev = activeSlot==='A' ? vidA  : vidB;
  next.src = src; next.loop = loop; next.muted = true; next.load();
  next.oncanplay = () => {
    next.play().catch(()=>{});
    next.classList.remove('hidden'); next.classList.add('visible');
    logoF.classList.add('hidden');
    if (activeSlot !== null) {
      prev.classList.remove('visible'); prev.classList.add('hidden');
      setTimeout(()=>{ prev.pause(); prev.src=''; }, 500);
    }
    activeSlot = activeSlot==='A' ? 'B' : 'A';
    if (!loop && onEnded) next.onended = onEnded;
  };
}

let currentPool = null;

function loopPool(pool) {
  loopOn = true;
  currentPool = pool;
  const curr = activeSlot === 'A' ? vidA : vidB;
  if (curr && !curr.paused && !curr.ended && curr.src) {
    curr.onended = () => { if (loopOn && currentPool === pool) _playNext(pool); };
    return;
  }
  _playNext(pool);
}

function _playNext(pool) {
  if (!loopOn) return;
  const next = activeSlot==='A' ? vidB : vidA;
  const prev = activeSlot==='A' ? vidA  : vidB;
  const src = rand(pool);
  next.src = src; next.loop = false; next.muted = true; next.load();
  next.oncanplay = () => {
    next.oncanplay = null;
    next.play().catch(()=>{});
    // Il prev rimane visibile finché next non è partito
    next.classList.remove('hidden'); next.classList.add('visible');
    logoF.classList.add('hidden');
    if (activeSlot !== null) {
      // Nascondi prev solo dopo che next sta girando
      requestAnimationFrame(() => {
        prev.classList.remove('visible'); prev.classList.add('hidden');
        setTimeout(() => { prev.pause(); prev.src = ''; }, 1000);
      });
    }
    activeSlot = activeSlot==='A' ? 'B' : 'A';
    next.onended = () => { if (loopOn && currentPool === pool) _playNext(pool); };
  };
}
function stopLoop() { loopOn = false; }

// ── Audio foresta (MP3) ───────────────────────────────────────────
let forestAudio = null;
function startForest() {
  if (forestAudio) return;
  try {
    forestAudio = new Audio(SERVER + '/totem/forest.mp3');
    forestAudio.loop = true;
    forestAudio.volume = 0.25;
    forestAudio.play().then(()=>console.log('✓ Foresta avviata')).catch(e=>console.error('✗ Foresta errore:', e));
  } catch(e){}
}

// Pausa/riprendi quando app va in background
document.addEventListener('visibilitychange', () => {
  if (!forestAudio) return;
  if (document.hidden) forestAudio.pause();
  else forestAudio.play().catch(()=>{});
});

// ── Avvio al tocco ────────────────────────────────────────────────
// Legge URL tunnel aggiornato da GitHub Pages
async function caricaTunnelUrl() {
  try {
    const base = 'https://fdnegozi-stack.github.io/lafataeildrago-backend/';
    const r = await fetch(base + 'tunnel-url.json?t=' + Date.now());
    const d = await r.json();
    if (d.url) { SERVER = d.url; console.log('✓ Tunnel URL:', SERVER); }
    else console.log('tunnel-url.json senza url:', d);
  } catch(e) { console.log('Errore caricaTunnelUrl:', e.message, '— uso fallback:', SERVER); }
}

async function avvia() {
  const o = document.getElementById('startOverlay');
  if (o) { o.style.opacity='0'; o.style.pointerEvents='none'; setTimeout(()=>o.remove(),1000); }

  // Carica URL tunnel aggiornato prima di tutto
  await caricaTunnelUrl();

  // Aggiorna pool video con nuovo SERVER
  POOL.entrata = [SERVER+'/video/entrata.mp4'];
  POOL.breve = ['attesa1_3','attesa2_3','attesa1_4','attesa1_5'].map(n=>SERVER+'/video/'+n+'.mp4');
  POOL.lunga = ['attesa1_9','attesa2_9','attesa3_9','attesa4_9'].map(n=>SERVER+'/video/'+n+'.mp4');
  POOL.parlato = [1,2,3].map(i=>SERVER+'/video/parlato normale '+i+'.mp4');

  startForest();

  // Mostra UI
  document.getElementById('ui').classList.add('show');
  document.getElementById('logoTop').classList.add('show');
  document.getElementById('statusRing').classList.add('show');
  setStatus('idle');

  // Precarica in background tutti i video di attesa
  setTimeout(() => {
    [...POOL.lunga, ...POOL.breve].forEach(src => _fetchVideo(src));
    console.log('📦 Precaricamento video avviato');
  }, 2000);

  // Avvia video entrata
  crossfadeTo(POOL.entrata[0], false, ()=>loopPool(POOL.lunga));
}

// ── Stato ─────────────────────────────────────────────────────────
let isBusy = false;
const storiaCon = [];
const ring   = document.getElementById('statusRing');
const bubble = document.getElementById('responseBubble');
const overlay= document.getElementById('listeningOverlay');
const micBtn = document.getElementById('micBtn');
const camInp = document.getElementById('cameraInput');

const setStatus = s => { ring.className = ''; ring.classList.add('show', s); };
const showText  = t => { /* testo nascosto nel mobile — solo audio */ };

// ── Offese ────────────────────────────────────────────────────────
const RE_GRAVE = /cazzo|vaffanculo|troia|puttana|bastard|fuck.*you|scheiss|merde|joder|kurwa/i;
const RE_MEDIA = /stupida|cretina|idiota|scema|deficiente|schifo|bitch|dumb|blöd/i;
const RE_LIEVE = /robot|macchina|stupida app|non servi|boring|pathetic/i;
let offesaCount = 0;
function offesa(t) {
  if (RE_GRAVE.test(t)) { offesaCount++; return offesaCount >= 2 ? 'seNeVa' : 'grave'; }
  if (RE_MEDIA.test(t)) { offesaCount++; return 'media'; }
  if (RE_LIEVE.test(t)) { offesaCount++; return 'lieve'; }
  offesaCount = 0; // reset se non offende
  return null;
}

// ── Fetch SSE ─────────────────────────────────────────────────────
async function fetchSSE(url, body, onToken, onDone, onError) {
  try {
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const text = await res.text();
    let full = '';
    for (const line of text.split('\n')) {
      if (!line.startsWith('data: ')) continue;
      try { const j=JSON.parse(line.slice(6)); if(j.token) full+=j.token; if(j.error){onError(j.error);return;} } catch(e){}
    }
    if (full.trim()) { onToken(full); onDone(); return; }
    try { const j=JSON.parse(text); const r=j.answer||j.text||''; if(r){onToken(r);onDone();return;} if(j.error){onError(j.error);return;} } catch(e){}
    onError('Nessuna risposta');
  } catch(e) { onError(e.message); }
}

// ── TTS + lipsync ─────────────────────────────────────────────────
// Selezione pesata 40/40/20 per video parlato
function randParlato() {
  const r = Math.random();
  if (r < 0.4) return POOL.parlato[0];
  if (r < 0.8) return POOL.parlato[1];
  return POOL.parlato[2];
}

async function speak(testo, tipo='normale') {
  setStatus('speak');
  // Mostra video parlato come placeholder mentre aspetta il lip-sync
  stopLoop();
  crossfadeTo(randParlato(), true);

  // Prima prova lip-sync
  try {
    const lsRes = await fetch(SERVER+'/api/tts-lipsync', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text:testo, lang:LANG, tipo })
    });
    const lsData = await lsRes.json();
    if (lsData.ok && lsData.videoUrl) {
      // Lip-sync pronto — video con audio incorporato
      stopLoop();
      crossfadeTo(SERVER+lsData.videoUrl, false, ()=>{ loopPool(POOL.lunga); setStatus('idle'); });
      return;
    }
  } catch(e) {}

  // Solo audio — usa audioUrl dalla risposta lipsync se disponibile
  try {
    const r = await fetch(SERVER+'/api/tts', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text:testo, lang:LANG })
    });
    if (r.ok) {
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const aud = new Audio(url);
      aud.play();
      aud.onended = ()=>{ URL.revokeObjectURL(url); setStatus('idle'); loopPool(POOL.lunga); };
      return;
    }
  } catch(e){}
  setStatus('idle');
  loopPool(POOL.lunga);
}

// ── Camera ────────────────────────────────────────────────────────
function openCamera() { if (!isBusy) camInp.click(); }
camInp.addEventListener('change', async () => {
  const file = camInp.files[0]; if (!file) return;
  isBusy=true; setStatus('think'); loopPool(POOL.lunga);
  const prevDiv = document.getElementById('photoPreview');
  const prevImg = document.getElementById('photoImg');
  const prevRes = document.getElementById('photoResult');
  prevImg.src = URL.createObjectURL(file);
  prevDiv.classList.add('show');
  prevRes.textContent='🔍 Sto cercando...';
  showText('Analisi in corso...');
  try {
    const fd = new FormData(); fd.append('image', file);
    const res = await fetch(SERVER+'/api/search', { method:'POST', body:fd });
    const data = await res.json();
    if (data.results?.length > 0) {
      const top = data.results[0];
      setStatus('speak'); showText('');
      await fetchSSE(SERVER+'/api/avatar-response', { prodotto:top, lingua:LANG, mode:'mobile' },
        t=>{ bubble.textContent+=t; bubble.classList.add('visible'); },
        ()=>{ speak(bubble.textContent); },
        ()=>{ showText('Ho trovato: '+top.nome); }
      );
      prevRes.textContent=`${top.nome} — €${top.prezzo}`;
    } else {
      showText('Non ho riconosciuto il prodotto. Riprova.');
      prevRes.textContent='';
    }
  } catch(e) { showText('Errore. Riprova.'); }
  isBusy=false; setStatus('idle'); camInp.value='';
});

// ── Microfono ─────────────────────────────────────────────────────
const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
let rec = null;

function startListening() {
  if (isBusy) return;
  if (!SR) { showText('⚠️ Usa Chrome per il riconoscimento vocale.'); return; }
  rec = new SR();
  rec.lang=LANG; rec.continuous=false; rec.interimResults=false; rec.maxAlternatives=1;

  rec.onstart = () => {
    isBusy=true; micBtn.classList.add('active');
    overlay.classList.add('show'); setStatus('listen');
    loopPool(POOL.lunga);
  };

  rec.onresult = async event => {
    const testo = event.results[0][0].transcript.trim();
    overlay.classList.remove('show'); micBtn.classList.remove('active');
    if (!testo||testo.length<2) { showText('Non ho capito. Riprova.'); isBusy=false; setStatus('idle'); return; }

    setStatus('think');
    loopPool(POOL.lunga); // mantieni video attivo durante elaborazione

    const off = offesa(testo);
    if (off) {
      stopLoop();
      if (off === 'seNeVa') {
        // Tania se ne va — sfondo vuoto per 10 secondi poi torna
        crossfadeTo(rand(POOL.offesaSeNeVa), false, ()=>{
          crossfadeTo(rand(POOL.sfondoVuoto), true);
          setTimeout(()=>loopPool(POOL.lunga), 10000);
        });
      } else {
        const pool = off==='grave'?POOL.offesaGrave : off==='media'?POOL.offesaMedia : POOL.offesaLieve;
        crossfadeTo(rand(pool), false, ()=>loopPool(POOL.lunga));
      }
    }

    storiaCon.push({ role:'user', content:testo });
    if (storiaCon.length > 8) storiaCon.splice(0,2);

    let risposta = '';
    await fetchSSE(
      SERVER+'/api/voice-answer', { text:testo, lang:LANG, mode:'mobile', storia:storiaCon.slice(-8) },
      t => { risposta+=t; }, // no testo nel mobile
      () => {
        storiaCon.push({ role:'assistant', content:risposta });
        const isEnfasi = /harry potter|signore degli anelli|witcher|dungeons|esclusiv|novit/i.test(risposta);
        speak(risposta, isEnfasi?'enfasi':'normale');
      },
      err => { showText('⚠️ '+err); }
    );
    if (!risposta) showText('⚠️ Nessuna risposta dal server.');
    isBusy=false; setStatus('idle');
  };

  rec.onerror = e => {
    overlay.classList.remove('show'); micBtn.classList.remove('active');
    isBusy=false; setStatus('idle'); loopPool(POOL.lunga);
    if (e.error==='no-speech') showText('Non ho sentito. Riprova.');
    else if (e.error==='not-allowed') showText('⚠️ Permesso microfono negato.');
    else showText('Errore microfono. Riprova.');
  };

  rec.onend = () => {
    overlay.classList.remove('show'); micBtn.classList.remove('active');
    if (isBusy) { isBusy=false; setStatus('idle'); }
  };

  rec.start();
}

function cancelListening() {
  if (rec) rec.abort();
  overlay.classList.remove('show'); micBtn.classList.remove('active');
  setStatus('idle'); isBusy=false; loopPool(POOL.lunga);
}
</script>
</body>
</html>
